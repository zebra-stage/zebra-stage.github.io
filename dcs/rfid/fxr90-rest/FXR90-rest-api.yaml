                type: string
    GetCablelosscompensationResponse:
      type: object
      description: Cable loss compensation settings keyed by read point number.
      minProperties: 1
      maxProperties: 8
      additionalProperties: false
      patternProperties:
        ^[1-8]$:
          type: object
          description: Cable loss compensation settings for a single antenna port.
          required:
          - cableLength
          - cableLossPerHundredFt
          properties:
            cableLength:
              type: number
              minimum: 0
              description: Length of the cable connected to this antenna port, in feet.
            cableLossPerHundredFt:
              type: number
              minimum: 0
              description: Cable signal loss per 100 feet, in dB.
    SetCablelosscompensationRequest:
      type: object
      oneOf:
      - description: Adjust cable loss compensation for all available read points.
        title: All
        type: object
        required:
        - cableLength
        - cableLossPerHundredFt
        properties:
          cableLength:
            type: number
            description: Cable length applied to all read points, in feet.
            minimum: 0
          cableLossPerHundredFt:
            type: number
            description: Cable loss applied to all read points per 100 feet, in dB.
            minimum: 0
      - description: Adjust cable loss compensation per read point using numeric read-point keys.
        title: Each
        type: object
        minProperties: 1
        maxProperties: 8
        additionalProperties: false
        patternProperties:
          ^[1-8]$:
            type: object
            description: Cable loss compensation settings for a single antenna port.
            required:
            - cableLength
            - cableLossPerHundredFt
            properties:
              cableLength:
                type: number
                description: Length of the cable connected to this antenna port, in feet.
                minimum: 0
              cableLossPerHundredFt:
                type: number
                description: Cable signal loss for this antenna port per 100 feet, in dB.
                minimum: 0
    SetCablelosscompensationResponse:
      type: string
