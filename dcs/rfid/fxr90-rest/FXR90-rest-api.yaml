            username:
              type: string
              description: Username for BASIC authentication.
            password:
              type: string
              description: Password for BASIC authentication.
        url:
          type: string
          format: uri
          description: URL to the OS image or update bundle. Supported URL schemes are scp://, https://, sftp://, and ftps://.
          oneOf:
          - pattern: ^scp://.+
          - pattern: ^https://.+
          - pattern: ^sftp://.+
          - pattern: ^ftps://.+
        transfer_protocol:
          type: string
          description: Optional explicit transfer protocol for firmware download. If omitted, protocol is inferred from the `url` scheme.
