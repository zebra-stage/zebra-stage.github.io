  /cloud/start:
    put:
      tags:
      - Control
      summary: Start RFID Inventory or BLE scan
      description: '## 1. Description


        The `PUT /cloud/start` REST endpoint starts RFID inventory, BLE scanning, or both on the reader.


        By default, an empty request body starts RFID inventory only. Use the `scanType` field to explicitly start BLE, RFID, or both together. Optional flags allow you to apply a previously saved Impinj Gen2X configuration or control whether the start state persists across reboots.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Scan Control - Start |

        | REST Endpoint | `PUT /cloud/start` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Supported Scan Types | `rfid`, `ble`, or both combined |

        | Firmware Requirement | BLE requires reader build **4.0.11** or later. On earlier builds the `scanType` field is not available. |


        ## 3. Before You Begin


        Make sure the relevant scanners are configured before sending this request.


        | What You Need | Details |

        |---|---|

        | HTTPS connectivity | The reader''s HTTPS endpoint must be reachable and a valid bearer token must be included in the `Authorization` header of every request. |

        | RFID configuration | Operating mode must be configured via `PUT /cloud/mode` (or default) before starting RFID inventory. |

        | BLE configuration | If starting BLE, the BLE scanner must be configured via `PUT /cloud/ble-config` with `ble.enable: true`. |

        | Gen2X configuration | If using `applyImpinjGen2X: true`, the Gen2X configuration must be saved via `PUT /cloud/impinjGen2X` beforehand. `applyImpinjGen2X` cannot be combined with a BLE-only scan (`scanType: ["ble"]`). |


        ## 4. What Happens After Start


        Once the `PUT /cloud/start` request succeeds, the reader transitions from **Idle** to **Running**. Two important behaviors govern the running session.


        ### Scan Type


        The `scanType` field determines which scanners run and where the data is published.


        | Scan Type | Behavior |

        |---|---|

        | `rfid` (default) | Starts RFID inventory only. Tag read events stream on the reader''s RFID data channel. |

        | `ble` | Starts BLE scanning only. BLE advertisement events stream on the reader''s BLE data channel. |

        | `["ble", "rfid"]` | Starts both scanners in a single session. RFID and BLE events stream independently on their respective data channels. |


        > Firmware requirement: BLE scanning — and with it the `scanType` field — is available from reader build **4.0.11** onward. On builds older than 4.0.11, `scanType` is not supported: omit it, and `PUT /cloud/start` starts RFID inventory only. Check the installed build with `GET /cloud/version` (`readerApplication`).


        ### Persistence Across Reboots


        The `doNotPersistState` field controls whether the reader resumes RFID inventory automatically after a reboot or reconnect. It applies to RFID only and has no effect on BLE scanning — a BLE scan never auto-resumes.


        | `doNotPersistState` | Behavior on Reboot or Reconnect |

        |---|---|

        | `false` (default) | The reader **remembers the running RFID inventory state** and automatically resumes it. |

        | `true` | The running state is **not saved**. The reader stays Idle until `PUT /cloud/start` is called again. |


        > Tip: Use `doNotPersistState: true` for one-time or debugging sessions where automatic resume after reboot is not desired.

        '
      operationId: startInventory
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartInventoryRequest'
            examples:
              start_Inventory:
                value: {}
              start_Inventory with AutoStart:
                value:
                  doNotPersistState: false
              start_Inventory with ImpinjGen2X:
                value:
                  applyImpinjGen2X: true
              start_BLE_only:
                value:
                  scanType:
                  - ble
              start_RFID_only:
                value:
                  scanType:
                  - rfid
              start_BLE_and_RFID:
                value:
                  scanType:
                  - ble
                  - rfid
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
  /cloud/stop:
    put:
      tags:
      - Control
      summary: Stop RFID Inventory or BLE scan
      description: '## 1. Description


        The `PUT /cloud/stop` REST endpoint stops RFID inventory, BLE scanning, or both.


        By default, if the request body is empty or `scanType` is not provided, the reader stops RFID inventory only. Use `scanType` when you need to stop BLE separately or stop both scan types together.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Scan Control - Stop |

        | REST Endpoint | `PUT /cloud/stop` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Supported Operations | Stop RFID inventory, BLE scan, or both |

        | Firmware Requirement | BLE requires reader build **4.0.11** or later. On earlier builds the `scanType` field is not available. |


        ## 3. Stop Behavior


        | Request Body | Result |

        |---|---|

        | `{}` | Stops RFID inventory only. This is the default behavior. |

        | `{ "scanType": ["rfid"] }` | Stops RFID inventory explicitly. BLE scanning continues if active. |

        | `{ "scanType": ["ble"] }` | Stops BLE scanning only. RFID inventory continues if active. |

        | `{ "scanType": ["ble", "rfid"] }` | Stops both BLE scanning and RFID inventory. |


        > Firmware requirement: BLE scanning — and with it the `scanType` field — is available from reader build **4.0.11** onward. On builds older than 4.0.11, `scanType` is not supported: send an empty body `{}`, which stops RFID inventory. Check the installed build with `GET /cloud/version` (`readerApplication`).


        ## 4. Before You Begin


        Stopping a scan type that is already idle may still succeed or may return failure depending on the reader state. If you need to know the current state first, check `GET /cloud/status`.


        | What You Need | Details |

        |---|---|

        | Current activity | Optional. Check `GET /cloud/status` if you need to confirm RFID or BLE activity before stopping. |

        | Target scan type | Choose `rfid`, `ble`, or both in `scanType`. Omit `scanType` only when you want the default RFID stop behavior. |

        '
      operationId: stopInventory
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StopInventoryRequest'
            examples:
              stop_RFID_default:
                value: {}
              stop_RFID_explicit:
                value:
                  scanType:
                  - rfid
              stop_BLE_only:
                value:
                  scanType:
                  - ble
              stop_BLE_and_RFID:
                value:
                  scanType:
                  - ble
                  - rfid
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
  /cloud/version:
    get:
      tags:
      - System
      summary: Retrieves reader component version information
      description: '## 1. Description


        The `GET /cloud/version` REST endpoint retrieves detailed hardware and software component version information from the reader''s software stack.


        This endpoint returns:


        - Reader application, radio firmware, and cloud agent versions

        - Radio control application version

        - Reader model and serial number

        - Available OS upgrade paths and rollback firmware details


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Version Query |

        | REST Endpoint | `GET /cloud/version` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve firmware, model, serial number, and upgrade details |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/version` to:


        - Confirm the installed firmware versions before or after a system update

        - Verify the exact reader model when applying model-specific configuration

        - Capture the serial number for asset tracking, remote fleet management, or support cases

        - Audit available OS upgrade paths or rollback capabilities across a fleet


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `readerApplication` | Current reader software version | Determines which features and API operations are available. |

        | `radioFirmware` | Firmware running on the radio module | Affects RF behavior, read performance, and hardware compatibility. |

        | `cloudAgentApplication` | Cloud agent version | Governs device-to-cloud messaging behavior and cloud connectivity. |

        | `model` | Reader model identifier | Drives physical capabilities, antenna limits, and model-specific settings. |

        | `serialNumber` | Unique reader serial number | Identifies the device for support cases and asset records. |

        | `availableOsUpgrades` | Is the object empty or populated? | A populated object means a downloaded OS upgrade is ready to install. |

        '
      operationId: getVersion
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetVersionResponse'
              example:
                cloudAgentApplication: 0.6.2.25
                model: FXR90
                radioControlApplication: 0.2.58.6
                radioFirmware: 2.1.57.0
                readerApplication: 2.0.7-5
                serialNumber: 233575230D0028
      security:
      - bearerAuth: []
  /cloud/status:
    get:
      tags:
      - System
      summary: Retrieves reader operational statistics
      description: "## 1. Description\n\nThe `GET /cloud/status` REST endpoint retrieves operational statistics and health information from the reader at the moment of the request.\n\nThis endpoint returns:\n\n- Uptime and current system time\n- Radio connection and activity state\n- Reader temperature\n- CPU and RAM usage\n- Flash storage usage by partition\n- Antenna port connection states\n- NTP synchronization status\n- Cloud interface connection status\n- Power source and power-negotiation state\n- Active Impinj Gen2X feature status (when a Gen2X feature is running)\n- BLE scanner runtime status (scan state, scan start time, and beacon counts by protocol)\n\nThe `ble` section is present only when BLE is supported and its status is available. No request body is required.\n\n## 2. Endpoint Details\n\n| Property | Value |\n|---|---|\n| Pattern Name | Reader Status Query |\n| REST Endpoint | `GET /cloud/status` |\n| Communication Type | Client to Device (HTTP request/response) |\n| Applies To | FXR90 |\n| Authentication | Bearer token (`Authorization: Bearer <token>`) |\n| Supported Operations | Retrieve live operational statistics and health |\n\n## 3. When to Use This Endpoint\n\nUse `GET /cloud/status` to:\n\n- Confirm the reader is powered, healthy, and reachable\n- Verify the radio is connected before starting inventory\n- Monitor reader temperature for thermal issues\n- Synchronize against the reader's current system time\n- Check CPU, RAM, and flash usage during high-load scenarios\n- Confirm BLE scanning is active and review beacon counts by protocol\n\nKey fields to check in the response:\n\n| Field | What to Check | Why It Matters |\n|---|---|---|\n| `uptime` | How long has the reader been running? | Long uptimes confirm stability; short uptimes indicate an unexpected restart. |\n| `radioConnection` | Is the value `connected`? | Inventory cannot run if the radio is disconnected. |\n| `radioActivity` | Is it `active` or `inactive`? | Confirms whether an inventory session is currently in progress. |\n| `temperature` | Is the value within safe operating range? | Excessive temperature can cause throttling or hardware faults. |\n| `antennas` | Are expected ports `connected`? | A `disconnected` antenna port means tags on that port will not be read. |\n| `ntp.offset` | Is the offset near zero? | A large NTP offset means event timestamps may be inaccurate. |\n| `ble.scanState` | Is the value `running`? | Confirms whether the BLE scanner is currently active (`running`) or `stopped`. |\n| `ble.scanStartTime` | When did the current scan start? | ISO 8601 timestamp marking when BLE scanning last started. |\n| `ble.beaconCounts` | Are advertisements being seen? | Per-protocol counts (`iBeacon`, `altBeacon`, `eddystone`, `generic`, `total`) confirm beacons are being detected in the current scan window. |\n\n## 4. BLE Status Fields\n\nWhen BLE is supported and active, the response includes a `ble` object:\n\n| Field | Type | Description |\n|---|---|---|\n| `ble.scanState` | string | Current BLE scanner state — `running` or `stopped`. |\n| `ble.scanStartTime` | string (date-time) | ISO 8601 timestamp of when the BLE scan was last started. |\n| `ble.beaconCounts.total` | integer | Total BLE advertisements observed in the current scan window. |\n| `ble.beaconCounts.iBeacon` | integer | Number of iBeacon advertisements observed. |\n| `ble.beaconCounts.altBeacon` | integer | Number of AltBeacon advertisements observed. |\n| `ble.beaconCounts.eddystone` | integer | Number of Eddystone advertisements observed. |\n| `ble.beaconCounts.generic` | integer | Number of generic BLE advertisements observed. |\n\nExample `ble` section:\n\n```json\n\"ble\": {\n  \"scanState\": \"running\",\n  \"scanStartTime\": \"2026-05-21T13:46:16.955Z\",\n  \"beaconCounts\": {\n    \"total\": 108,\n    \"iBeacon\": 75,\n    \"altBeacon\": 33,\n    \"eddystone\": 0,\n    \"generic\": 0\n  }\n}\n```\n"
      operationId: getStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetStatusResponse'
              example:
                antennas:
                  '1': disconnected
                  '2': disconnected
                  '3': disconnected
                  '4': disconnected
                  '5': connected
                  '6': connected
                cpu:
                  system: 0
                  user: 2
                flash:
                  platform:
                    free: 0
                    total: 0
