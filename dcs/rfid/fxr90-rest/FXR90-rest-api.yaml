    LocalrestloginResponse:
      type: object
      properties:
        code:
          type: number
        message:
          type: string
    GetAppledResponse:
      type: object
      properties:
        status:
          type: string
          description: Current state of the application LED.
          enum:
          - DEFAULT
          - NON_DEFAULT
    SetAppledRequest:
      type: object
      properties:
        color:
          type: string
          description: The color of the LED (red, amber, green, off).
          enum:
          - red
          - amber
          - green
          - 'off'
        flash:
          type: boolean
          description: Whether the LED should blink.
        seconds:
          type: number
          description: Duration in seconds. Use 0 for indefinite.
    SetAppledResponse:
      type: string
      description: Returns an empty string on success.
    GetStackledResponse:
      type: object
      properties:
        status:
          type: string
        color:
          type: string
        brightness:
          type: string
        flash:
          type: boolean
        seconds:
          type: integer
        seconds_remaining:
          type: integer
    SetStackledRequest:
      type: object
      properties:
        color:
          type: string
          description: The color of the LED (red, amber, green, blue, off)
          enum:
          - red
          - amber
          - green
          - blue
          - 'off'
        brightness:
          type: string
          description: The brightness of the LED (low, med, high). Defaults to low.
          enum:
          - low
          - med
          - high
        flash:
          type: boolean
        seconds:
          type: integer
    SetStackledResponse:
      type: string
      description: Returns an empty string on success.
    GetGpoStatusResponse:
      type: object
      properties:
        '1':
          type: string
          enum:
          - HIGH
          - LOW
        '2':
          type: string
          enum:
          - HIGH
          - LOW
        '3':
          type: string
          enum:
          - HIGH
          - LOW
        '4':
          type: string
          enum:
          - HIGH
          - LOW
    SetGpoRequest:
      type: object
      required:
      - port
      - state
      properties:
        port:
          type: number
          description: GPO port number (1–4 for FXR90; device-specific maximum applies).
          minimum: 1
          maximum: 4
        state:
          type: boolean
          description: Desired GPO state — true for HIGH, false for LOW.
    SetGpoResponse:
      type: string
      description: Returns an empty string on success.
    GetGPIStatusResponse:
      type: object
      required:
      - '1'
      - '2'
      - '3'
      - '4'
      properties:
        '1':
          type: string
          description: GPI port 1 state reported by the reader.
          enum:
          - HIGH
          - LOW
        '2':
          type: string
          description: GPI port 2 state reported by the reader.
          enum:
          - HIGH
          - LOW
        '3':
          type: string
          description: GPI port 3 state reported by the reader.
          enum:
          - HIGH
          - LOW
        '4':
          type: string
          description: GPI port 4 state reported by the reader.
          enum:
          - HIGH
          - LOW
    GetRegionResponse:
      type: object
      properties:
        FrequencyHopping:
          type: boolean
          description: True when frequency hopping is enabled in the active region configuration.
        region:
          type: string
          description: Active region name configured on the reader (for example, US).
        regulatoryStandard:
          type: string
          description: Active regulatory standard for the region (for example, FCC, ETSI, CANADA_FCC_15).
        lbtEnabled:
          type: boolean
          description: True when Listen-Before-Talk is enabled for the selected regulatory configuration.
        channelData:
          type: array
          description: Active channel list used by the region/standard configuration, represented as frequencies (kHz).
          items:
            type: integer
        country:
          type: string
          description: Country name associated with the active region configuration.
        minTxPowerSupported:
          type: number
          description: Minimum transmit power supported for the active regulatory standard.
        maxTxPowerSupported:
          type: number
          description: Maximum transmit power supported for the active regulatory standard.
    SetRegionRequest:
      type: object
      required:
      - country
      - standardname
      properties:
        country:
          type: string
          description: Country name. Valid values can be retrieved from GET /cloud/supportedRegionList.
        standardname:
          type: string
          description: Regulatory standard name for the chosen country. Valid values can be retrieved from GET /cloud/supportedStandardList?region=<country>.
        isLBT:
          type: boolean
          description: Optional. Enables Listen-Before-Talk when supported by the selected standard.
        channeldata:
          type: array
          description: Optional channel frequency list (kHz) to apply when channel selection is supported by the selected standard.
          items:
            type: integer
    SetRegionResponse:
      type: string
      description: Returns an empty string on success.
    GetSupportedregionlistResponse:
      type: object
      required:
      - SupportedRegions
      properties:
        SupportedRegions:
          type: array
          description: List of country/region names supported by the reader.
          items:
            type: string
            description: Supported country/region name.
    GetSupportedstandardlistResponse:
      type: object
      properties:
        SupportedStandards:
          type: array
          items:
            type: object
            properties:
              StandardName:
                type: string
                description: Regulatory standard identifier for the region.
              channeldata:
                type: array
                description: List of center frequencies (in kHz) for the standard's channels.
                items:
                  type: string
              isChannelSelectable:
                type: string
                description: Whether individual channels can be selected. String-encoded boolean.
                enum:
                - 'true'
                - 'false'
              isHoppingConfigurable:
                type: string
                description: Whether frequency hopping is configurable. String-encoded boolean.
                enum:
                - 'true'
                - 'false'
              isLBTConfigurable:
                type: string
                description: Whether Listen-Before-Talk (LBT) is configurable. String-encoded boolean.
                enum:
                - 'true'
                - 'false'
    GetModeRequest:
      type: object
      properties:
        verbose:
          type: boolean
          description: Controls how much of the operating-mode configuration is returned. When `true`, the reader returns the entire mode configuration, including every default value. When `false` or omitted, the reader returns only the settings that have been explicitly configured for the current mode; default values are omitted.
    SetModeRequest:
      allOf:
      - $ref: '#/components/schemas/operatingMode.v1'
      - type: object
        description: Additional legacy fields accepted by set_mode.
        properties:
          component:
            type: string
            description: Legacy wrapper field retained for backward compatibility.
          linkProfile:
            type: number
            description: Link profile identifier.
          payload:
            type: string
            description: Legacy wrapper field retained for backward compatibility.
    SetModeResponse:
      type: string
      description: Returns an empty string on success.
    StartInventoryRequest:
      type: object
      properties:
        scanType:
          type: array
          description: Which scan types to start. Omit for RFID-only (default).
          items:
            type: string
            enum:
            - ble
            - rfid
          minItems: 1
          uniqueItems: true
        doNotPersistState:
          type: boolean
          description: Applies to RFID inventory only — it has no effect on BLE scanning. Controls whether the started RFID inventory state is persisted across reboot. If `true`, the state is not persisted and auto-start is not enabled after reboot. If `false`, the state is persisted across reboot, enabling auto-start.
        applyImpinjGen2X:
          type: boolean
          description: 'When true, applies the previously configured Impinj Gen2X features (FastID, TagProtect, TagFocus, TagQuieting) on start. Cannot be used with `scanType: ["ble"]`.'
    StopInventoryRequest:
      type: object
      properties:
        scanType:
          type: array
          description: Which scan types to stop. Omit for RFID-only (default).
          items:
            type: string
            enum:
            - ble
            - rfid
          minItems: 1
          uniqueItems: true
    GetVersionResponse:
      type: object
      properties:
        cloudAgentApplication:
          type: string
          description: Version of the cloud agent application.
        model:
          type: string
          description: Reader model identifier returned by the device.
          enum:
          - FXR90
        radioControlApplication:
          type: string
          description: Version of the radio control application.
        radioFirmware:
          type: string
          description: Version of the radio firmware.
        readerApplication:
          type: string
          description: Version of the main reader application.
        serialNumber:
          type: string
          description: Reader serial number.
    GetStatusResponse:
      type: object
      properties:
        antennas:
          type: object
          description: Per-antenna connection status reported by the reader.
          properties:
            1:
              type: string
              description: Antenna 1 connection state.
              enum:
              - connected
              - disconnected
            2:
              type: string
              description: Antenna 2 connection state.
              enum:
              - connected
              - disconnected
            3:
              type: string
              description: Antenna 3 connection state.
              enum:
              - connected
              - disconnected
            4:
              type: string
              description: Antenna 4 connection state.
              enum:
              - connected
              - disconnected
            5:
              type: string
              description: Antenna 5 connection state.
              enum:
              - connected
              - disconnected
            6:
              type: string
              description: Antenna 6 connection state.
              enum:
              - connected
              - disconnected
            7:
              type: string
              description: Antenna 7 connection state.
              enum:
              - connected
              - disconnected
            8:
              type: string
              description: Antenna 8 connection state.
              enum:
              - connected
              - disconnected
        cpu:
          type: object
          description: CPU utilization statistics reported by the reader.
          properties:
            system:
              type: number
              description: Percentage of CPU time spent in kernel/system mode.
            user:
              type: number
              description: Percentage of CPU time spent in user mode.
        flash:
          type: object
          description: Flash storage utilization by partition.
          properties:
            platform:
              type: object
              description: Usage metrics for the platform partition.
              properties:
                free:
                  type: number
                total:
                  type: number
                used:
                  type: number
            readerConfig:
              type: object
              description: Usage metrics for the reader configuration partition.
              properties:
                free:
                  type: number
                total:
                  type: number
                used:
                  type: number
            readerData:
              type: object
              description: Usage metrics for the reader data partition.
              properties:
                free:
                  type: number
                total:
                  type: number
                used:
                  type: number
            rootFileSystem:
              type: object
              description: Usage metrics for the root filesystem partition.
              properties:
                free:
                  type: number
                total:
                  type: number
                used:
                  type: number
        interfaceConnectionStatus:
          type: object
          description: Connectivity status for configured cloud/network interfaces.
          properties:
            data:
              type: array
              description: Per-interface connection status entries.
              items:
                type: object
                properties:
                  connectionError:
                    type: string
                    description: Last connection error message, if any.
                  connectionStatus:
                    type: string
                    description: Current connection state for the interface.
                  description:
                    type: string
                    description: Human-readable interface description.
                  interface:
                    type: string
                    description: Interface name.
        ntp:
          type: object
          description: NTP synchronization status information.
          properties:
            offset:
              type: number
              description: Current NTP clock offset.
            reach:
              type: number
              description: NTP reachability register value.
        powerNegotiation:
          type: string
          description: Power negotiation mode reported by the reader.
        powerSource:
          type: string
          description: Current power source for the reader. On the FXR90, `DC` indicates the reader is powered by the external DC power brick (Power Brick).
          enum:
          - DC
          - POE
          - POE+
        radioActivity:
          type: string
          description: Current radio activity state.
          enum:
          - active
          - inactive
        radioConnection:
          type: string
          description: Current radio connection state.
          enum:
          - connected
          - disconnected
        ram:
          type: object
          description: RAM utilization statistics.
          properties:
            free:
              type: number
              description: Free RAM amount.
            total:
              type: number
              description: Total RAM amount.
            used:
              type: number
              description: Used RAM amount.
        systemTime:
          type: string
        temperature:
          type: number
        uptime:
          type: string
        impinjGen2X:
          type: object
          description: Active Impinj Gen2X runtime status.
          properties:
            active:
              type: boolean
              description: Indicates whether an Impinj Gen2X feature is currently active
            feature:
              type: string
              description: The name of the active Impinj Gen2X feature
              enum:
              - fastId
              - tagFocus
              - tagProtect
              - tagQuieting
        ble:
          type: object
          description: BLE scanner runtime status. Present only when BLE is supported and status is available.
          properties:
            scanState:
              type: string
              description: Current state of the BLE scanner.
              enum:
              - running
              - stopped
            scanStartTime:
              type: string
              format: date-time
              description: ISO 8601 timestamp when the BLE scan was last started.
            beaconCounts:
              type: object
              description: Counts of BLE beacons detected since the last scan start.
              properties:
                total:
                  type: integer
                  description: Total number of beacons detected.
                iBeacon:
                  type: integer
                  description: Number of iBeacon advertisements detected.
                altBeacon:
                  type: integer
                  description: Number of AltBeacon advertisements detected.
                eddystone:
                  type: integer
                  description: Number of Eddystone advertisements detected.
                generic:
                  type: integer
                  description: Number of generic (unclassified) BLE advertisements detected.
    GetConfigResponse:
      type: object
      properties:
        GPIO-LED:
          description: GPIO and LED trigger mapping configuration. Returns "NOT_CONFIGURED" when no GPIO-LED configuration has been applied.
          oneOf:
          - type: string
            description: Returned as "NOT_CONFIGURED" when GPIO-LED config has not been set.
        READER-GATEWAY:
          type: object
          description: Reader Gateway cloud connectivity configuration, including endpoint connections, batching, retention, and management event settings.
          properties:
            batching:
              description: Global batching configuration for data events. Returned as an array (one entry per data endpoint connection) or a single object applied to all connections.
              oneOf:
              - type: object
                description: Single batching config applied to all data endpoints.
                properties:
                  maxPayloadSizePerReport:
                    type: number
                    description: Maximum payload size per batch report in bytes (0 - 256000). -1 to disable.
                  reportingInterval:
                    type: number
                    description: Batch reporting interval in milliseconds (0 - 86400000). -1 to disable.
              - type: array
                description: Per-endpoint batching config (one entry per data endpoint connection).
                items:
                  type: object
                  properties:
                    maxPayloadSizePerReport:
                      type: number
                      description: Maximum payload size per batch report in bytes (0 - 256000). -1 to disable.
                    reportingInterval:
                      type: number
                      description: Batch reporting interval in milliseconds (0 - 86400000). -1 to disable.
            endpointConfig:
              type: object
              description: Cloud connectivity endpoint configuration for control, data, and management planes.
              properties:
                control:
                  type: object
                  description: Control plane endpoint configuration (command/response channel).
                  properties:
                    commandResponse:
                      type: object
                      description: Control plane command and response MQTT connection configuration.
                      properties:
                        connections:
                          type: array
                          description: List of control plane cloud connections.
                          items:
                            type: object
                            properties:
                              description:
                                type: string
                                description: Human-readable description of this connection.
                              name:
                                type: string
                                description: Unique name identifier for this connection.
                              type:
                                type: string
                                description: 'Connection type. Supported values: mqtt, mqtt-AWS, mqtt-Azure, httpPost, WEBSOCKET, tcpip-server.'
                              options:
                                type: object
                                description: Connection-specific options.
                                properties:
                                  additional:
                                    type: object
                                    description: Additional MQTT connection parameters.
                                    properties:
                                      cleanSession:
                                        type: boolean
                                        description: If true, broker discards previous session state on connect (MQTT clean session flag).
                                      clientId:
                                        type: string
                                        description: MQTT client identifier used when connecting to the broker.
                                      debug:
                                        type: boolean
                                        description: Enable verbose MQTT debug logging.
                                      keepAlive:
                                        type: number
                                        description: MQTT keep-alive interval in seconds. The reader sends a PINGREQ if no message is sent within this interval.
                                      qos:
                                        type: number
                                        description: MQTT Quality of Service level (0 = at most once, 1 = at least once).
                                      reconnectDelay:
                                        type: number
                                        description: Initial delay in seconds before attempting to reconnect after disconnect.
                                      reconnectDelayMax:
                                        type: number
                                        description: Maximum delay in seconds between reconnect attempts (exponential backoff cap).
                                  enableSecurity:
                                    type: boolean
                                    description: When true, TLS/SSL is used for the connection.
                                  endpoint:
                                    type: object
                                    description: Remote broker or server endpoint details.
                                    properties:
                                      hostName:
                                        type: string
                                        description: Hostname or IP address of the MQTT broker or cloud endpoint.
                                      port:
                                        type: number
                                        description: TCP port number of the MQTT broker or cloud endpoint.
                                      protocol:
                                        type: string
                                        description: 'Transport protocol. Common values: tcp, ssl, ws (WebSocket), wss (WebSocket Secure).'
                                  publishTopic:
                                    type: array
                                    description: MQTT topic(s) the reader publishes responses to.
                                    items:
                                      type: string
                                  security:
                                    type: object
                                    description: TLS/SSL certificate and key configuration.
                                    properties:
                                      CACertificateFileLocation:
                                        type: string
                                        description: Absolute path to the CA (Certificate Authority) certificate file on the reader.
                                      installedCertificateName:
                                        type: string
                                        description: Name of a pre-installed certificate stored on the reader.
                                      installedCertificateType:
                                        type: string
                                        description: Type of the pre-installed certificate (e.g. "server", "client").
                                      keyAlgorithm:
                                        type: string
                                        description: Signing algorithm for JWT-based authentication (e.g. RS256, ES256).
                                      keyFormat:
                                        type: string
                                        description: Key file format (e.g. PEM).
                                      privateKeyFileLocation:
                                        type: string
                                        description: Absolute path to the private key file on the reader.
                                      publicKeyFileLocation:
                                        type: string
                                        description: Absolute path to the public key or client certificate file on the reader.
                                      verifyHostName:
                                        type: boolean
                                        description: When true, the broker's hostname is verified against its TLS certificate CN/SAN.
                                      verifyPeer:
                                        type: boolean
                                        description: When true, the server's TLS certificate is validated against the CA certificate.
                                  subscribeTopic:
                                    type: array
                                    description: MQTT topic(s) the reader subscribes to for incoming commands.
                                    items:
                                      type: string
                data:
                  type: object
                  description: Data plane endpoint configuration (tag read event publishing channel).
