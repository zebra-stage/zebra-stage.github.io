          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetHostNameResponse'
      security:
      - bearerAuth: []
  /cloud/impinjGen2X:
    get:
      tags:
      - ImpinjGen2X
      summary: Get Impinj Gen2X configuration
      description: '## 1. Description


        The `GET /cloud/impinjGen2X` REST endpoint retrieves the Impinj Gen2X configuration currently saved on the reader.


        This endpoint returns:


        - Whether FastID, TagFocus, TagProtect, or TagQuieting is configured

        - The parameters for each enabled Gen2X feature


        No request body is required. If no Gen2X configuration has been saved, the response payload will be an empty object.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Impinj Gen2X Configuration Query |

        | REST Endpoint | `GET /cloud/impinjGen2X` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve saved Impinj Gen2X configuration |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/impinjGen2X` to:


        - Check whether FastID, TagProtect, TagFocus, or TagQuieting has been configured

        - Review Gen2X settings before applying them with a `PUT /cloud/start` call

        - Confirm the effect of a prior `PUT /cloud/impinjGen2X` call


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `fastID` | Is FastID enabled? | FastID embeds the TID in the singulation response, enabling faster tag identification without a separate read. |

        | `tagFocus` | Is TagFocus configured? | TagFocus reduces re-reading of already-singulated tags in dense tag populations. |

        | `tagQuieting` | Is TagQuieting set? | TagQuieting suppresses repeated reads of the same tag EPC within a session. |

        | `tagProtect` | Is TagProtect active? | TagProtect applies Impinj proprietary tag locking features for secure deployments. |

        '
      operationId: getImpinjGen2X
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetImpinjGen2XResponse'
              examples:
                empty:
                  value: {}
                fastID_configured:
                  value:
                    fastID:
                      enabled: true
                tagFocus_configured:
                  value:
                    tagFocus:
                      enabled: true
                tagProtect_configured:
                  value:
                    tagProtect:
                      action: enableTagProtection
                      password: '77777777'
                      tagID: e2801191a5030069073b426d
                      enableShortRange: true
                tagQuieting_basic_configured:
                  value:
                    tagQuieting:
                      basic:
                        action: quiet
                        tagIDs:
                        - e2801191a5030069073b426d
                tagQuieting_advanced_configured:
                  value:
                    tagQuieting:
                      advanced:
                        tagQuietMasks:
                        - S0A
                        - S2A
                        target: SL
                        stateAwareAction: ASSERTSL
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetImpinjGen2XResponse500'
      security:
      - bearerAuth: []
    put:
      tags:
      - ImpinjGen2X
      summary: Set Impinj Gen2X configuration
      description: "## 1. Description\n\nThe `PUT /cloud/impinjGen2X` REST endpoint configures Impinj Gen2X proprietary RFID features on the reader.\n\nThis endpoint allows you to configure:\n\n- FastID tag TID embedding through `fastID`\n- Tag protection and visibility control through `tagProtect`\n- TagFocus session suppression through `tagFocus`\n- Tag quieting (basic or advanced) through `tagQuieting`\n\n## 2. Endpoint Details\n\n| Property | Value |\n|---|---|\n| Pattern Name | Impinj Gen2X Configuration |\n| REST Endpoint | `PUT /cloud/impinjGen2X` |\n| Communication Type | Client to Device (HTTP request/response) |\n| Applies To | FXR90 |\n| Authentication | Bearer token (`Authorization: Bearer <token>`) |\n| Content-Type | `application/json` |\n| Success Response | `200 OK` |\n| Error Responses | `422 Unprocessable Entity`, `500 Internal Server Error` |\n| Supported Features | `fastID`, `tagProtect`, `tagFocus`, `tagQuieting` |\n| Supported TagProtect Actions | `enableTagProtection`, `disableTagProtection`, `enableTagVisibility`, `disableTagVisibility` |\n| Supported TagQuieting Modes | `basic` (quiet/unquiet by EPC list), `advanced` (pre-select with mask) |\n| Supported TagQuieting Basic Actions | `quiet`, `unquiet` |\n| Supported Gen2 Memory Banks | EPC, TID, USER, RESERVED |\n| Supported Select Targets | S0, S1, S2, S3, SL |\n| Supported Tag Quiet Masks | S0A, S0B, S1A, S1B, S2A, S2B, S3A, S3B, SL_ASSERT, SL_DEASSERT |\n| Mutually Exclusive Features | `fastID`, `tagFocus`, `tagQuieting` (only one reader-scoped feature active at a time) |\n\n## 3. Before You Begin\n\nDecide which Gen2X feature to configure before sending this request. At least one feature object must be included in the request body, but mutually exclusive reader-scoped features cannot be combined in a single request. To apply the saved Gen2X configuration during inventory, send `PUT /cloud/start` with `applyImpinjGen2X: true`.\n\n| What You Need | Details |\n|---|---|\n| Feature selection | At least one of `fastID`, `tagProtect`, `tagFocus`, or `tagQuieting` must be present - an empty request body will be rejected. Choose only one reader-scoped feature (`fastID`, `tagFocus`, or `tagQuieting`) per request; `tagProtect` is tag-scoped and can be configured independently. |\n| FastID | Decide whether to enable or disable TID embedding. Optionally specify a TID word selector (`TID[0]`-`TID[3]`). |\n| TagProtect action | Choose one of: `enableTagProtection` (protect a specific tag), `disableTagProtection` (remove protection from a tag), `enableTagVisibility` (allow reading protected tags), `disableTagVisibility` (block reading protected tags). |\n| TagProtect password | An 8-character hex string (32-bit) is required for all TagProtect actions. |\n| TagProtect tag EPC | `tagID` (hex EPC) is required for `enableTagProtection` and `disableTagProtection`. It must be omitted for `enableTagVisibility` and `disableTagVisibility`. |\n| TagFocus | Whether to enable or disable the feature. TagFocus targets session S1. |\n| TagQuieting | For basic: provide `action` (`quiet`/`unquiet`) and the `tagIDs` EPC array (maximum 31 tag IDs per request). For advanced: provide the `preSelect` array, `tagQuietMasks`, `target`, and `stateAwareAction`. |\n| Inventory state | Configure Gen2X before starting inventory. Stop any active inventory first with `PUT /cloud/stop`. |\n| Activation | Gen2X settings are saved but not applied until `PUT /cloud/start` is sent with `applyImpinjGen2X: true`. |\n\n## 4. Choosing a Gen2X Feature\n\nThe Gen2X feature you select determines the reader's behavior during inventory. Choose based on your operational goal.\n\n| Feature | Description | Scope |\n|---|---|---|\n| `fastID` | Returns the EPC and TID together in a single read, eliminating the need for a separate TID read. Best for applications that require chip-level identity (anti-counterfeit, authentication). | Reader-scoped |\n| `tagProtect` | Password-protects individual tags or controls reader visibility of protected tags. Use for securing sensitive items or restricting access. | Tag-scoped\
        \ |\n| `tagFocus` | Silences already-read tags so the reader focuses only on new tags entering the field. Ideal for portal and conveyor applications. | Reader-scoped |\n| `tagQuieting` (basic) | Silences a specific list of tag EPCs from being reported during inventory. Use when you know exactly which tags to suppress. | Reader-scoped |\n| `tagQuieting` (advanced) | Uses Gen2 select pre-conditions (mask + state-aware action) to silence tags based on memory content or session state. Use for complex filtering in dense environments. | Reader-scoped |\n\n> Mutually exclusive: Only one of `fastID`, `tagFocus`, or `tagQuieting` can be active at a time. `tagProtect` can coexist with any one of them because it operates at the tag level.\n\n## 5. Choosing TagProtect Actions\n\nTagProtect operations either lock/unlock individual tags or temporarily allow the reader to see already-protected tags. Each action has specific field requirements.\n\n| Action | What It Does | Required Fields | Key Constraints |\n|---|---|---|---|\n| `enableTagProtection` | Permanently protects a tag; the tag becomes invisible to standard reads until unprotected. | `password`, `tagID` | `password` must be exactly 8 hex characters. Optional `enableShortRange` reduces read range during protection. |\n| `disableTagProtection` | Removes protection from a previously protected tag, restoring normal visibility. | `password`, `tagID` | `password` must match the tag's existing access password exactly. |\n| `enableTagVisibility` | Temporarily allows the reader to read protected tags during this session. Does not change the tag's protection state. | `password` | Reader-scoped; affects all protected tags in field. |\n| `disableTagVisibility` | Restores the default behavior where protected tags are hidden from the reader. | `password` | Reverts the effect of `enableTagVisibility`. |\n\n> Important: `enableTagProtection` and `disableTagProtection` are tag-specific (require `tagID`). `enableTagVisibility` and `disableTagVisibility` are reader-wide visibility toggles.\n\n## 6. Choosing TagQuieting Strategy\n\nTagQuieting silences tags from being reported during inventory. Choose between **basic** (EPC-list based) and **advanced** (Gen2 select mask based) depending on your filtering complexity.\n\n### Basic TagQuieting\n\n| Field | What It Controls |\n|---|---|\n| `action: quiet` | Silences the listed tags from being reported in future inventories. |\n| `action: unquiet` | Restores reporting for previously quieted tags. |\n| `tagIDs` | Array of EPCs (hex strings) to quiet or unquiet. Maximum **31 EPCs** per request. |\n\n### Advanced TagQuieting\n\nAdvanced quieting uses Gen2 select pre-conditions to silence tags based on memory content and state, instead of explicit EPC lists.\n\n| Field | What It Controls |\n|---|---|\n| `preSelect[]` | Array of Gen2 select operations applied **before** quieting. Each entry contains `target`, `action`, and `mask`. |\n| `preSelect[].target` | The session flag or SL to act upon (`S0`, `S1`, `S2`, `S3`, `SL`). |\n| `preSelect[].action` | The state-aware action to take on match/mismatch (e.g., `ASSERTSL_NOTHING`, `INVB_INVA`, `DEASSERTSL_NOTHING`, `INVA_INVB`). |\n| `preSelect[].mask` | The memory mask: `bank` (EPC/TID/USER/RESERVED), `pointer` (bit offset), `length` (bits), `value` (hex). |\n| `tagQuietMasks` | Array of session-flag combinations defining the quieted state (`S0A`, `S2B`, `SL_ASSERT`, `SL_DEASSERT`, etc.). |\n| `target` | The target session/flag used for the actual quieting operation. |\n| `stateAwareAction` | The compound state action (e.g., `ASSERTSL_DEASSERTSL`, `DEASSERTSL_ASSERTSL`) applied during quieting. |\n\n> Important: Use `basic` when you have a discrete list of EPCs. Use `advanced` when filtering by memory content, session state, or complex multi-step Gen2 select conditions.\n\n## 7. Choosing FastID and TagFocus\n\nThese two reader-scoped features improve inventory performance but cannot be combined.\n\n### `fastID`\n\n| Field | What It Controls |\n|---|---|\n| `enabled: true` | Reader returns EPC + TID together\
        \ in a single read, reducing total operations. |\n| `enabled: false` | Reverts to standard EPC-only reads. |\n\n**Use FastID when:** Your application needs TID for every tag (e.g., authentication, chip-level traceability) and you want to avoid the extra round-trip of a separate TID read.\n\n### `tagFocus`\n\n| Field | What It Controls |\n|---|---|\n| `enabled: true` | Once a tag is read, it is silenced for the rest of the inventory cycle. The reader focuses only on new tags entering the field. |\n| `enabled: false` | Standard inventory behavior; tags can be reported multiple times. |\n\n**Use TagFocus when:** You operate portals, conveyors, or other scenarios with many duplicate reads of the same tag set and want unique-tag reporting.\n\n## 8. Applying the Configuration\n\nCalling this endpoint only **saves** the configuration on the reader; it is not active until inventory is started with the activation flag.\n\n### REST Workflow\n\n```text\nPUT  /cloud/stop                 -> stop any active inventory\nPUT  /cloud/impinjGen2X          -> save the configuration\nGET  /cloud/impinjGen2X          -> verify the saved configuration\nPUT  /cloud/start                -> body: { \"applyImpinjGen2X\": true }\n```\n\n### Request Format\n\nEvery request to this endpoint follows this structure:\n\n```http\nPUT /cloud/impinjGen2X HTTP/1.1\nHost: <reader-address>\nAuthorization: Bearer <token>\nContent-Type: application/json\n\n{\n  // one or more Gen2X feature objects\n}\n```\n\n### Success Response (`200 OK`)\n\n```http\nHTTP/1.1 200 OK\nContent-Type: application/json\n\n{\n  \"message\": \"Configuration saved successfully\"\n}\n```\n\n### Error Responses\n\n| Status Code | Meaning | When It Occurs |\n|---|---|---|\n| `422 Unprocessable Entity` | Validation error | Empty body, mutually exclusive features sent together, invalid enum value, or constraint violation. |\n| `500 Internal Server Error` | Reader-side failure | Internal reader error while persisting the configuration. |\n\n> Persistence: The reader stores the last saved configuration and restores it across reboots and reconnects. The configuration is only applied during inventory when `applyImpinjGen2X: true` is sent in the `PUT /cloud/start` request body.\n"
      operationId: setImpinjGen2X
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetImpinjGen2XRequest'
            examples:
              enable_fastID:
                value:
                  fastID:
                    enabled: true
              disable_fastID:
                value:
                  fastID:
                    enabled: false
              protect_tag:
                value:
                  tagProtect:
                    action: enableTagProtection
                    password: '77777777'
                    tagID: e2801191a5030069073b426d
                    enableShortRange: true
              unprotect_tag:
                value:
                  tagProtect:
                    action: disableTagProtection
                    password: '77777777'
                    tagID: e2801191a5030069073b426d
              enable_protect_read:
                value:
                  tagProtect:
                    action: enableTagVisibility
                    password: '77777777'
              disable_protect_read:
                value:
                  tagProtect:
                    action: disableTagVisibility
                    password: '77777777'
              enable_tagFocus:
                value:
                  tagFocus:
                    enabled: true
              disable_tagFocus:
                value:
                  tagFocus:
                    enabled: false
              quiet_tags:
                value:
                  tagQuieting:
                    basic:
                      action: quiet
                      tagIDs:
                      - e2801191a5030069073b426d
                      - e2801191a5030069073b426e
              unquiet_tags:
                value:
                  tagQuieting:
                    basic:
                      action: unquiet
                      tagIDs:
                      - e2801191a5030069073b426d
              advanced_quiet_tags:
                value:
                  tagQuieting:
                    advanced:
                      preSelect:
                      - target: SL
                        action: ASSERTSL_NOTHING
                        mask:
                          bank: EPC
                          pointer: 32
                          length: 96
                          value: E280123456789012345678AB
                      - target: S2
                        action: INVB_INVA
                        mask:
                          bank: EPC
                          pointer: 32
                          length: 96
                          value: E280AABBCCDDEEFF11223344
                      tagQuietMasks:
                      - SL_ASSERT
                      - S2B
                      target: SL
                      stateAwareAction: ASSERTSL_DEASSERTSL
              advanced_unquiet_tags:
                value:
                  tagQuieting:
                    advanced:
                      preSelect:
                      - target: SL
                        action: DEASSERTSL_NOTHING
                        mask:
                          bank: EPC
                          pointer: 32
                          length: 96
                          value: E280123456789012345678AB
                      - target: S2
                        action: INVA_INVB
                        mask:
                          bank: EPC
                          pointer: 32
                          length: 96
                          value: E280AABBCCDDEEFF11223344
                      tagQuietMasks:
                      - SL_DEASSERT
                      - S2A
                      target: SL
                      stateAwareAction: DEASSERTSL_ASSERTSL
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetImpinjGen2XResponse'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetImpinjGen2XResponse422'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetImpinjGen2XResponse500'
      security:
      - bearerAuth: []
  /cloud/ble-config:
    put:
      tags:
      - Ble
      summary: Set BLE configuration
      description: '## 1. Description


        The `PUT /cloud/ble-config` REST endpoint configures the Bluetooth Low Energy (BLE) scanner on the reader.


        This endpoint allows you to configure:


        - BLE scanner enable or disable through `ble.enable`

        - Scan interval through `ble.scanIntervalSec`

        - Cross-protocol RSSI and service UUID filters through `ble.additionalFilters`

        - iBeacon filters through `ble.protocols.iBeacon`

        - AltBeacon filters through `ble.protocols.altBeacon`

        - Eddystone filters through `ble.protocols.eddystone`

        - Generic BLE device filters through `ble.protocols.generic`


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | BLE Configuration Update |

        | REST Endpoint | `PUT /cloud/ble-config` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Required Request Fields | `ble.enable` |

        | Supported BLE Protocols | iBeacon, AltBeacon, Eddystone (`URL`, `UID`, `EID`, `TLM`), Generic |

        | Firmware Requirement | BLE requires reader build **4.0.11** or later. On earlier builds this endpoint is not available. |

        | Supported Address Types | `public`, `random` |

        | RSSI Filter Range | `-127` to `0` dBm |

        | Scan Interval Minimum | 1 second |


        ## 3. Before You Begin


        Decide which BLE behavior you need to configure before sending this request. A minimal request only needs `ble.enable`; additional fields refine which beacons are captured.


        | What You Need | Details |

        |---|---|

        | Enable decision | `ble.enable` is required in every request. Set to `true` to activate scanning, or `false` to disable it. |

        | Scan interval | How often the reader collects BLE scan results (`scanIntervalSec`). Minimum value is `1` second. Shorter intervals increase responsiveness; longer intervals reduce data volume. |

        | RSSI threshold | Set `additionalFilters.rssi` to drop weak advertisements. Range is `-127` to `0` dBm; values closer to zero indicate stronger signals. |

        | Service UUID filters | Prepare 16-bit (`serviceUuids16`) or 128-bit (`serviceUuids128`) UUID lists to filter by advertised services. |

        | iBeacon details | UUID, major, minor, and txPower values for each iBeacon filter entry. |

        | AltBeacon details | Manufacturer ID, beacon ID, major, minor, and refRssi for each AltBeacon filter entry. |

        | Eddystone frame type | Choose `URL`, `UID`, `EID`, or `TLM` and supply the corresponding fields (`url`, `namespace`/`instance`, `ephemeralId`). |

        | Generic BLE device | Bluetooth MAC address, address type (`public`/`random`), device name, or alias for each generic filter entry. |

        | Activation | Saving this configuration does not start BLE scanning. Send `PUT /cloud/start` with `scanType: ["ble"]` to begin scanning. |

        '
      operationId: setBleConfig
      requestBody:
        required: true
        content:
          application/json:
