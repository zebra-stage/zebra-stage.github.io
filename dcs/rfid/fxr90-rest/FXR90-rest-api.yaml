          - SCP
          - HTTPS
          - SFTP
          - FTPS
        verifyPeer:
          type: boolean
          description: Verify the server TLS peer certificate. Defaults to true when omitted.
        verifyHost:
          type: boolean
          description: Verify the server hostname in the TLS certificate. Defaults to true when omitted.
        CACertificateFileLocation:
          type: string
          description: Path on the device to a CA certificate file to trust for TLS.
        CACertificateFileContent:
          type: string
          description: PEM-encoded CA certificate content; written to a temporary file when provided.
        publicKeyFileLocation:
          type: string
          description: Path to a public key / certificate file to use for client TLS authentication.
        publicKeyFileContent:
          type: string
          description: PEM-encoded public key / certificate content.
        privateKeyFileLocation:
          type: string
          description: Path to a private key file to use for client TLS authentication.
        privateKeyFileContent:
          type: string
          description: PEM-encoded private key content.
        installedCertificateType:
          type: string
          description: Use an installed certificate by specifying its type.
        installedCertificateName:
          type: string
          description: Name of an installed certificate to use.
        headers:
          type: object
          description: Optional HTTP headers to include in the download request (e.g. Authorization).
          additionalProperties:
            type: string
        retry:
          type: object
          description: Retry configuration for the download operation.
          properties:
            count:
              type: integer
            delayInSec:
              type: integer
