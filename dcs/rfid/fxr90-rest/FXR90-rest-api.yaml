        | What You Need | Details |

        |---|---|

        | Log retrieval | Confirm you have downloaded the radio packet logs using `GET /cloud/logs/radioPacketLog` before purging. Deletion is permanent and cannot be undone. |

        | Logging state | If radio packet logging (`radioPacketLog`) is currently enabled, the reader will start writing new log data immediately after purge. Disable logging first (via `PUT /cloud/logs`) if you want to start a clean session with no logging active. |

        '
      security:
      - bearerAuth: []
      responses:
        '200':
          description: OK
  /cloud/timeZone:
    get:
      tags:
      - Date&Time
      summary: Retrieves the reader timezone
      description: '## 1. Description


        The `GET /cloud/timeZone` REST endpoint retrieves the time zone currently configured on the reader.


        This endpoint returns:


        - The configured time zone value (a reader-supported time zone name in `(GMT±hh:mm) Region` format)


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Time Zone Query |

        | REST Endpoint | `GET /cloud/timeZone` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve the configured time zone |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/timeZone` to:


        - Confirm the reader''s time zone before relying on event timestamps

        - Verify the result of a prior `PUT /cloud/timeZone` call

        - Audit time zone consistency across a fleet of readers


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `timeZone` | Is this the correct time zone for the deployment location? | An incorrect time zone causes local event timestamps to be offset from actual local time. |

        '
      operationId: getTimezone
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getTimeZone'
      security:
      - bearerAuth: []
    put:
      tags:
      - Date&Time
      summary: Sets the timezone
      description: '## 1. Description


        The `PUT /cloud/timeZone` REST endpoint sets the time zone on the reader.


        This endpoint allows you to configure:


        - The reader''s local time zone through `timeZone`


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Time Zone Configuration |

        | REST Endpoint | `PUT /cloud/timeZone` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Required Request Fields | `timeZone` |


        ## 3. Before You Begin


        Have the exact time zone string ready before sending this request. An unrecognized time zone string will be rejected.


        | What You Need | Details |

        |---|---|

        | Time zone string | A reader-supported time zone name (e.g., `"International Date Line West"`, `"Pacific Time (US & Canada)"`). Use `GET /cloud/timeZone` to check the currently configured value. |

        | Site location | Confirm the physical deployment location of the reader to select the correct time zone. |

        '
      operationId: setTimezone
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/setTimeZone'
            examples:
              set_timeZone:
                value:
                  timeZone: UTC
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetTimezoneResponse'
      security:
      - bearerAuth: []
  /cloud/ntpServer:
    get:
      tags:
      - Date&Time
      summary: Retrieve the NTP server
      description: '## 1. Description


        The `GET /cloud/ntpServer` REST endpoint retrieves the NTP server currently configured for time synchronization on the reader.


        This endpoint returns:


        - The NTP server hostname or IP address


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | NTP Server Query |

        | REST Endpoint | `GET /cloud/ntpServer` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve the configured NTP server |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/ntpServer` to:


        - Confirm the reader is pointed at the correct time source for the deployment

        - Verify the result of a prior `PUT /cloud/ntpServer` call

        - Troubleshoot clock drift that is affecting event timestamps


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `server` | Is this the correct NTP server address? | An incorrect or unreachable NTP server causes clock drift, making event timestamps unreliable. |

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetNtpServerResponse'
      security:
      - bearerAuth: []
    put:
      tags:
      - Date&Time
      summary: Set NTP server
      description: '## 1. Description


        The `PUT /cloud/ntpServer` REST endpoint sets one or more NTP servers used by the reader for time synchronization.


        This endpoint allows you to configure:


        - The primary NTP server through `server` (current convention) or `server1` (legacy convention)

        - An optional secondary NTP server through `server2`


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | NTP Server Configuration |

        | REST Endpoint | `PUT /cloud/ntpServer` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Required Request Fields | `server` (or `server1` for the legacy convention) |


        ## 3. Before You Begin


        Confirm that the NTP server is reachable from the reader''s network before sending this request. An unreachable NTP server will leave the reader clock unsynchronized.


        | What You Need | Details |

        |---|---|

        | Primary NTP server | Hostname or IP address of the primary NTP server. Provide it as `server` (current convention) or `server1` (legacy convention). The reader must be able to reach this address on UDP port 123. |

        | Secondary NTP server | Optional - provide `server2` as a backup time source. |

        | Network access | NTP uses UDP port 123. Ensure this port is open between the reader and the NTP server on all network paths. |

        '
      operationId: updateNtpServer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNtpServerRequest'
            examples:
              set_ntpServer:
                value:
                  server: time1.google.com
                  server2: time2.google.com
              set_ntpServer_legacy:
                value:
                  server1: time1.google.com
                  server2: time2.google.com
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateNtpServerResponse'
      security:
      - bearerAuth: []
  /cloud/certificates:
    get:
      tags:
      - Certificate
      summary: Retrieve installed certificate details
      description: '## 1. Description


        The `GET /cloud/certificates` REST endpoint retrieves the list of certificates installed on the reader.


        This endpoint returns:


        - An array of installed certificates, each with name, type, serial number, and validity dates


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Certificate Inventory Query |

        | REST Endpoint | `GET /cloud/certificates` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve the list of installed certificates |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/certificates` to:


        - Audit which certificates are installed and their current validity windows

        - Confirm a certificate was successfully installed or removed

        - Retrieve serial numbers for certificate rotation audits

        - Check expiry dates before a scheduled certificate renewal


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `name` | Is the expected certificate present? | Confirms the correct certificate is installed for TLS or authentication. |

        | `type` | What type of certificate is it (`server`, `client`, or `app`)? | Differentiates server, client, and app certificates used for different purposes. |

        | `validityEnd` | When does it expire? | Expired certificates will cause TLS handshake failures and connectivity loss. |

        | `serial` | Does the serial match the expected certificate? | Verifies the exact certificate instance, useful for rotation audits. |

        '
      operationId: getCertificates
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCertificatesResponse'
      security:
      - bearerAuth: []
    put:
      tags:
      - Certificate
      summary: Install certificate
      description: '## 1. Description


        The `PUT /cloud/certificates` REST endpoint installs or updates a certificate on the reader by downloading a PFX file from a URL.


        This endpoint allows you to configure:


        - The certificate name assigned on the reader through `name`

        - The certificate type through `type`

        - The download source URL through `url`

        - The authentication method for the download server through `authenticationType`

        - The PFX file password through `pfxPassword`


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Certificate Installation |

        | REST Endpoint | `PUT /cloud/certificates` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Required Request Fields | `name`, `type`, `url` |

        | Supported Certificate Types | `client`, `server`, `app` |

        | Supported Transfer Protocols | `HTTPS`, `FTPS`, `SFTP` |

        | Supported Authentication Types | `NONE`, `BASIC` |


        ## 3. Before You Begin


        Gather all certificate source details before sending this request. An invalid URL, wrong certificate type, missing download credentials, or an incorrect PFX password will cause installation to fail.


        | What You Need | Details |

        |---|---|

        | Certificate name | A unique name to assign to this certificate on the reader. If a certificate with this name already exists, it will be replaced. |

        | Certificate type | `client` for mutual TLS authentication, `server` for CA/server trust, or `app` for application-specific certificates. |

        | Source URL | An `HTTPS`, `FTPS`, or `SFTP` URL where the reader can download the PFX certificate file. The reader must have network connectivity to reach this URL. |

        | Authentication type | `NONE` if the download server requires no credentials, or `BASIC` if username and password authentication is required. |

        | Download credentials | Required only when `authenticationType` is `BASIC`. Provide `options.username` and `options.password`. |

        | PFX password | The password protecting the PFX file (`pfxPassword`). Required if the PFX was exported with password protection. |

        '
      operationId: setUpdatecertificate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetUpdatecertificateRequest'
            examples:
              set_updateCertificate:
                value:
                  options:
                    password: zebra
                    username: zebra
                  authenticationType: BASIC
                  name: reader
                  pfxPassword: abcd12345
                  type: client
                  url: https://10.117.229.15/reader.pfx
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
  /cloud/certificates/{certname}:
    parameters:
    - name: certname
      in: path
      required: true
      description: Certificate name. This path value is used as the certificate name for refresh and delete operations.
      schema:
        type: string
    put:
      tags:
      - Certificate
      summary: Refresh certificate
      description: '## 1. Description


        The `PUT /cloud/certificates/{certname}` REST endpoint refreshes an already-installed certificate on the reader by re-fetching or re-applying it from its configured source.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Certificate Refresh |

        | REST Endpoint | `PUT /cloud/certificates/{certname}` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Path Parameter | `certname` (the installed certificate name to refresh) |

        | Required Request Fields | `type` |

        | Supported Certificate Types | `client`, `server`, `app` |


        ## 3. Before You Begin


        The certificate must already be installed. Use `GET /cloud/certificates` to confirm the certificate name and `type`.


        | What You Need | Details |

        |---|---|

        | Certificate name | The exact name of the installed certificate, supplied as the `{certname}` path parameter. |

        | Certificate type | The `type` of the certificate: `client`, `server`, or `app`, sent in the request body. |

        '
      operationId: setRefreshcertificate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRefreshcertificateRequest'
            examples:
              set_refreshCertificate_server:
                value:
                  type: server
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetRefreshcertificateResponse'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Certificate
      summary: Delete certificate
      description: '## 1. Description


        The `DELETE /cloud/certificates/{certname}` REST endpoint removes an installed certificate from the reader. When you call this endpoint, the certificate identified by the `{certname}` path parameter and its `type` is deleted from the reader''s certificate store.


        > **The server certificate cannot be deleted through this API.** Only `client` and `app` certificates can be removed — the `type` parameter accepts `client` or `app` only. The reader''s server certificate is required for TLS and has no delete operation.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Certificate Deletion |

        | REST Endpoint | `DELETE /cloud/certificates/{certname}` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Path Parameter | `certname` (the certificate name to delete) |

        | Required Request Fields | `type` |

        | Supported Certificate Types | `client`, `app` (the `server` certificate cannot be deleted) |


        ## 3. Before You Begin


        Confirm the certificate is no longer in use before sending this request. Cross-reference the certificate name and type with your active endpoint configuration and the list returned by `GET /cloud/certificates`.


        | What You Need | Details |

        |---|---|

        | Certificate name | The exact name of the certificate to delete, supplied as the `{certname}` path parameter, as returned by `GET /cloud/certificates`. The name is case-sensitive. |

        | Certificate type | The `type` of the certificate: `client` or `app`, sent in the request body. The type must match the installed certificate. The `server` certificate cannot be deleted. |

        | Active use check | Confirm the certificate is not currently used for an active MQTT TLS or HTTPS endpoint connection. Deleting an in-use certificate will cause TLS handshake failures on the next reconnect. |

        '
      operationId: delCertificate
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DelCertificateResponse'
      security:
      - bearerAuth: []
      parameters:
      - name: type
        in: query
        required: true
        schema:
          type: string
          description: 'Certificate type. Valid values: client, app.'
          enum:
          - client
          - app
  /cloud/caCertificates:
    get:
      tags:
      - Certificate
      summary: List installed CA certificates
      description: '## 1. Description


        The `GET /cloud/caCertificates` REST endpoint retrieves the list of CA (Certificate Authority) certificates installed on the reader.


        This endpoint returns:


        - An array of installed CA certificate names


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | CA Certificate Inventory Query |

        | REST Endpoint | `GET /cloud/caCertificates` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve the list of installed CA certificate names |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/caCertificates` to:


        - Confirm which CA certificates are installed before configuring a TLS endpoint that must trust them

        - Audit the reader''s CA trust store across a fleet of readers

        - Verify a CA certificate was installed after `PUT /cloud/caCertificates/{caname}`, or removed after `DELETE /cloud/caCertificates/{caname}`

        - Reconcile the reader''s trust anchors against your organization''s PKI


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | CA certificate name | Is the expected CA certificate name present in the returned array? | Confirms the reader trusts the CA that issued your broker or endpoint TLS certificates. |

        '
      operationId: getCACertificates
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/caCertificateList.v1'
              examples:
                get_CACertificates:
                  value:
                  - AmazonRootCA1
                  - broker.emqx.io-ca
      security:
      - bearerAuth: []
  /cloud/caCertificates/{caname}:
    parameters:
    - name: caname
      in: path
      required: true
      description: CA certificate name. For local REST this path parameter is used as the certificate name. For MQTT, `name` is provided in the payload.
      schema:
        type: string
    put:
      tags:
      - Certificate
      summary: Install CA certificate
      description: '## 1. Description


        The `PUT /cloud/caCertificates/{caname}` REST endpoint installs a CA (Certificate Authority) root certificate on the reader by providing the PEM-encoded certificate content in the request body.


        This endpoint allows you to configure:


        - The CA certificate name through the `{caname}` path parameter

        - The PEM-encoded certificate content through `content`


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | CA Certificate Installation |

        | REST Endpoint | `PUT /cloud/caCertificates/{caname}` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Path Parameter | `caname` (the CA certificate name to install) |

        | Required Request Fields | `content` |


        ## 3. Before You Begin


        Have the CA certificate''s PEM content ready before sending this request. Invalid PEM content will be rejected and the CA will not be installed.


        | What You Need | Details |

        |---|---|

        | CA certificate name | A unique name to assign this CA certificate on the reader, supplied as the `{caname}` path parameter. If a CA with this name already exists, it will be replaced. |

        | PEM content | The full PEM-encoded CA certificate string (`content`), including the `-----BEGIN CERTIFICATE-----` and `-----END CERTIFICATE-----` headers and footers. |

        | Certificate validity | Confirm the CA certificate is not expired before installing it. An expired CA root will still install but will fail to validate any certificates it issued. |

        | Intended use | Know which MQTT broker or HTTP endpoint TLS certificate is issued by this CA, so you can verify the chain after installation with `GET /cloud/caCertificates`. |

        '
      operationId: setInstallCACertificate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/installCACertificate.v1'
