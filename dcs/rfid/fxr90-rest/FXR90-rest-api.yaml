                  tagLocationingSupported: false
                  triggers:
                  - GPI
      security:
      - bearerAuth: []
  /cloud/cableLossCompensation:
    get:
      tags:
      - System
      summary: Retrieves the cableLossCompensation
      description: '## 1. Description


        The `GET /cloud/cableLossCompensation` REST endpoint retrieves the cable loss compensation values configured on the reader for each configured read point.


        This endpoint returns:


        - Cable length per read point

        - Cable loss per hundred feet per read point


        No request body is required. Values are returned using read-point keys `1` through `8` (only configured read points are included).


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Cable Loss Compensation Query |

        | REST Endpoint | `GET /cloud/cableLossCompensation` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve per-read-point cable loss compensation values |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/cableLossCompensation` to:


        - Review compensation values before adjusting transmit power settings

        - Verify cabling assumptions per antenna or read point

        - Audit RF link budgets across all read points

        - Confirm settings after replacing antenna cabling or after a prior `PUT /cloud/cableLossCompensation` call


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `1.cableLength` | What cable length is configured for read point 1? | Cable length feeds into the loss calculation that adjusts effective transmit power. |

        | `1.cableLossPerHundredFt` | What loss per 100 ft is configured for read point 1? | Higher cable loss requires the reader to transmit at a higher power to compensate. |

        | Per-port consistency | Are all active read points configured? | Unconfigured ports default to zero compensation, which may underpower long cable runs. |

        '
      operationId: getCablelosscompensation
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCablelosscompensationResponse'
              example:
                '1':
                  cableLength: 10
                  cableLossPerHundredFt: 10
                '2':
                  cableLength: 10
                  cableLossPerHundredFt: 10
                '3':
                  cableLength: 10
                  cableLossPerHundredFt: 10
                '4':
                  cableLength: 10
                  cableLossPerHundredFt: 10
      security:
      - bearerAuth: []
    put:
      tags:
      - System
      summary: Sets the cableLossCompensation
      description: '## 1. Description


        The `PUT /cloud/cableLossCompensation` REST endpoint configures cable loss compensation values for each antenna read point on the reader.


        This endpoint allows you to configure:


        - Cable length and loss-per-hundred-feet for read points `1` through `8`


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Cable Loss Compensation Configuration |

        | REST Endpoint | `PUT /cloud/cableLossCompensation` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Supported Read Point Keys | `"1"` through `"8"` |


        ## 3. Before You Begin


        Measure the physical cable runs for each antenna port before sending this request. Incorrect values will produce inaccurate compensation and may reduce read range.


        | What You Need | Details |

        |---|---|

        | Read point keys | Use numeric string keys `"1"` through `"8"` in the request body. Only include keys for ports that have physical cables attached. |

        | Cable length | The length of the antenna cable in the unit expected by the reader (feet). Measure the actual cable run from the reader port to the antenna. |

        | Cable loss per hundred feet | The attenuation rating of the cable type in dB per 100 feet. This value is specified by the cable manufacturer. |

        | Available read points | Use `GET /cloud/readPoints` to confirm which read point IDs are available on this reader before sending. |

        '
      operationId: setCablelosscompensation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetCablelosscompensationRequest'
            examples:
              set_cableLossCompensation:
                value:
                  '1':
                    cableLength: 90
                    cableLossPerHundredFt: 18
                  '2':
                    cableLength: 18
                    cableLossPerHundredFt: 19
                  '3':
                    cableLength: 10
                    cableLossPerHundredFt: 11
                  '4':
                    cableLength: 10
                    cableLossPerHundredFt: 70
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetCablelosscompensationResponse'
        '400':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetCablelosscompensationResponse400'
        '500':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetCablelosscompensationResponse500'
      security:
      - bearerAuth: []
  /cloud/reboot:
    put:
      tags:
      - System
      summary: Restarts reader
      description: '## 1. Description


        The `PUT /cloud/reboot` REST endpoint restarts the reader. All in-progress operations stop and the reader briefly disconnects until boot completes.


        This endpoint requires:


        - No request body — the endpoint takes no parameters


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Reader Restart |

        | REST Endpoint | `PUT /cloud/reboot` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Request Body | None |


        ## 3. Before You Begin


        Plan for downtime — the reader will disconnect until it finishes booting. In-flight inventory and active connections will be interrupted.


        | What You Need | Details |

        |---|---|

        | Downtime window | Allow 1–3 minutes for reboot and reconnect |

        '
      operationId: reboot
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RebootResponse'
      security:
      - bearerAuth: []
  /cloud/preSelection:
    get:
      tags:
      - Control
      summary: Returns whether the rxSawFilter is enabled or disabled
      description: '## 1. Description


        The `GET /cloud/preSelection` REST endpoint retrieves the current rxSawFilter pre-selection state from the reader.


        This endpoint returns:


        - Whether the rxSawFilter (receive SAW filter pre-selection) is enabled or disabled


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | rxSawFilter Status Query |

        | REST Endpoint | `GET /cloud/preSelection` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve the rxSawFilter pre-selection state |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/preSelection` to:


        - Check whether rxSawFilter is enabled or disabled before starting inventory

        - Verify the RF pre-selection state in deployments where receiver filtering matters

        - Confirm the effect of a prior `PUT /cloud/preSelection` call


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `preSelection` | Is the filter enabled or disabled? | Enabling the SAW filter improves receiver selectivity in noisy RF environments but may reduce sensitivity in clean environments. |

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPreSelectionResponse'
      security:
      - bearerAuth: []
    put:
      tags:
      - Control
      summary: Enables or disables the rxSawFilter
      description: '## 1. Description


        The `PUT /cloud/preSelection` REST endpoint enables or disables the rxSawFilter pre-selection feature on the reader.


        This endpoint allows you to configure:


        - The rxSawFilter (receive SAW filter pre-selection) state through `preSelection`


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | rxSawFilter Configuration |

        | REST Endpoint | `PUT /cloud/preSelection` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Request Fields | `preSelection` |


        ## 3. Before You Begin


        Determine the appropriate rxSawFilter state for the deployment environment before sending this request. Use `GET /cloud/preSelection` to check the current state before changing it.


        | What You Need | Details |

        |---|---|

        | Filter state | `true` to enable rxSawFilter (better selectivity in noisy environments), or `false` to disable it (better sensitivity in clean environments). |

        | Deployment RF environment | Consider enabling the filter when the reader operates near other UHF RFID systems or dense RF infrastructure. Disable it in quiet, isolated RF environments to maximize read range. |

        '
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPreSelectionRequest'
            examples:
              set_preSelection:
                value:
                  preSelection: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetPreSelectionResponse'
      security:
      - bearerAuth: []
  /cloud/updatePassword:
    put:
      tags:
      - System
      summary: Updates the local REST login password
      description: '## 1. Description


        The `PUT /cloud/updatePassword` REST endpoint allows you to edit the `admin` and `rfidadm` password.


        Only the password is changed. `userName` selects **which** of the two accounts to update — it does not rename an account, and it cannot create one.


        This endpoint allows you to configure:


        - Which account to change through `userName` (`admin` or `rfidadm`)

        - That account''s existing password through `currentPassword`

        - The new password to set through `newPassword`


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Password Change |

        | REST Endpoint | `PUT /cloud/updatePassword` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Required Request Fields | `userName`, `currentPassword`, `newPassword` |


        ## 3. Before You Begin


        Confirm the current password and the target account before sending this request. Using the wrong current password will cause the request to fail.


        | What You Need | Details |

        |---|---|

        | Account | Which account to change, supplied in `userName`: `admin` or `rfidadm`. This selects the account only — the account itself is not renamed. |

        | Current password | The account''s existing password. Required for authentication - the request will fail if this is incorrect. |

        | New password | The new password to set. Apply your organization''s password policy (minimum length, complexity requirements). |

        '
      operationId: updatePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
            examples:
              set_password:
                value:
                  userName: admin
                  currentPassword: oldPassword@123
                  newPassword: newPassword@123
              set_password_rfidadm:
                value:
                  userName: rfidadm
                  currentPassword: oldPassword@123
                  newPassword: newPassword@123
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePasswordResponse'
      security:
      - bearerAuth: []
  /cloud/logs:
    get:
      tags:
      - Logs
      summary: Retrieves reader log configuration
      description: '## 1. Description


        The `GET /cloud/logs` REST endpoint retrieves the reader''s current log configuration, including the radio packet log enable flag and per-component log levels.


        This endpoint returns:


        - Whether radio packet logging is enabled (`radioPacketLog`)

        - The configured log level for each reader software component (`components`)


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Log Configuration Query |

        | REST Endpoint | `GET /cloud/logs` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve current logging configuration |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/logs` to:


        - Review which components are set to verbose or debug logging before a troubleshooting session

        - Confirm radio packet log capture is enabled before downloading log files

        - Audit per-component verbosity during troubleshooting or before a support handoff

        - Verify the effect of a prior `PUT /cloud/logs` call


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `radioPacketLog` | Is packet logging enabled? | Must be enabled before log files (`GET /cloud/logs/radioPacketLog`) will contain meaningful data. |

        | `components` | Are component levels set to the appropriate verbosity? | Higher verbosity generates more log data but may affect performance in production deployments. |

        '
      operationId: getLogs
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logLevel.v1'
              example:
                radioPacketLog: true
                components:
                - componentName: radio_control
                  level: INFO
                - componentName: reader_gateway
                  level: DEBUG
      security:
      - bearerAuth: []
    put:
      tags:
      - Logs
      summary: Updates reader log configuration
      description: '## 1. Description


        The `PUT /cloud/logs` REST endpoint configures logging behavior on the reader, including per-component log verbosity and radio packet log capture.


        This endpoint allows you to configure:


        - Whether radio packet logging is enabled through `radioPacketLog`

        - The log level for each reader software component through `components`


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Log Configuration |

        | REST Endpoint | `PUT /cloud/logs` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Supported Log Levels | `OFF`, `FATAL`, `ERROR`, `WARNING`, `INFO`, `DEBUG`, `TRACE`, `EXTRA` |

        | Supported Components | `radio_control` (alias `RC`), `cloud_agent`, `reader_gateway` (alias `RG`) |


        ## 3. Before You Begin


        Decide which logging areas you need to change before sending this request. Verbose log levels can fill storage quickly in production deployments.


        | What You Need | Details |

        |---|---|

        | Radio packet log | Whether to enable or disable `radioPacketLog` (boolean). Enabling this is required before `GET /cloud/logs/radioPacketLog` will return useful data. |

        | Component name | The component whose level to change: `radio_control` (alias `RC`), `cloud_agent`, or `reader_gateway` (alias `RG`). |

        | Log level | The verbosity level to apply, one of `OFF`, `FATAL`, `ERROR`, `WARNING`, `INFO`, `DEBUG`, `TRACE`, or `EXTRA`. `OFF` disables logging for the component. |

        | Storage impact | Verbose levels such as `DEBUG`, `TRACE`, and `EXTRA` generate the most data. Confirm available flash storage before enabling verbose logging for extended periods. |

        '
      operationId: setLogs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/logLevel.v1'
            examples:
              set_logs:
                value:
                  components:
                  - componentName: radio_control
                    level: DEBUG
                  - componentName: cloud_agent
                    level: DEBUG
                  radioPacketLog: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetLogsResponse'
      security:
      - bearerAuth: []
  /cloud/logs/syslog:
    get:
      tags:
      - Logs
      summary: Retrieve Syslog
      description: '## 1. Description


        The `GET /cloud/logs/syslog` REST endpoint retrieves the reader''s operating-system system log as a downloadable archive.


        This endpoint returns:


        - The archive filename

        - The Base64-encoded `.tar.gz` syslog content


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Syslog Retrieval |

        | REST Endpoint | `GET /cloud/logs/syslog` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve the system log archive |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/logs/syslog` to:


        - Retrieve OS-level events for troubleshooting system startup, network changes, or service crashes

        - Investigate unexpected reboots or hardware-related events

        - Capture system logs before a reader restart resets the log buffer


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `filename` | Is a filename returned? | Confirms the archive was generated and identifies the log file for record keeping. |

        | `binary` | Is the Base64 string non-empty? | Syslog captures low-level OS events that application logs may not surface; an empty value indicates no syslog data was available. |

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetLogsSyslogResponse'
      security:
      - bearerAuth: []
    delete:
      tags:
      - Logs
      summary: Purge Log
      description: '## 1. Description


        The `DELETE /cloud/logs/syslog` REST endpoint purges system log files stored on the reader. When you call this endpoint, all accumulated syslog data is permanently deleted from the reader''s storage.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Syslog Purge |

        | REST Endpoint | `DELETE /cloud/logs/syslog` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Request Body | None |


        ## 3. Before You Begin


        Archive the syslog files with `GET /cloud/logs/syslog` before sending this request if you need to retain them for support cases or post-incident analysis.


        | What You Need | Details |

        |---|---|

        | Log retrieval | Confirm you have downloaded the syslog using `GET /cloud/logs/syslog` before purging. Deletion is permanent and cannot be undone. |

        | Diagnostic baseline | If you plan to run a diagnostic session after purging, ensure all relevant services are in a known state before the purge so the new logs capture only the events of interest. |

        '
      responses:
        '200':
          description: OK
      security:
      - bearerAuth: []
