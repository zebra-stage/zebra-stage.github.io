  /cloud/localRestLogin:
    get:
      tags:
      - Login
      summary: Reader Login
      description: '## 1. Description


        The `GET /cloud/localRestLogin` REST endpoint authenticates to the reader and returns a bearer token for all other REST API calls.


        On success, the response contains `code` (`0` = success) and `message` (the bearer token). No request body is required.


        ## 2. Authentication


        If a bearer token has already been copied from the dashboard page, use it in **Authorize → bearerAuth**.


        If not, enter Admin login credentials in **Authorize → basicAuth**, execute `GET /cloud/localRestLogin`, and copy the bearer token from the response into **Authorize → bearerAuth**.


        | Scenario | Swagger UI steps |

        |---|---|

        | Already have a token | **Authorize → bearerAuth** → paste token → call other endpoints |

        | Need a token | **Authorize → basicAuth** → run this endpoint → copy `message` → **Authorize → bearerAuth** |


        This endpoint requires **HTTP Basic Auth** (admin credentials). All other `/cloud/*` endpoints require **bearerAuth**.


        ## 3. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/localRestLogin` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | HTTP Basic Auth (admin reader credentials) |

        '
      operationId: localrestlogin
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalrestloginResponse'
      security:
      - basicAuth: []
  /cloud/app-led:
    get:
      tags:
      - App-led
      summary: Retrieves application LED state
      description: '## 1. Description


        The `GET /cloud/app-led` REST endpoint retrieves the current state of the application LED on the reader.


        This endpoint returns:


        - The application LED status (`DEFAULT` or `NON_DEFAULT`)


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/app-led` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/app-led` to:


        - Confirm whether the application LED is showing default reader state or has been overridden

        - Verify the effect of a prior `PUT /cloud/app-led` call

        - Audit LED state as part of a device health or provisioning check


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `status` | Is it `DEFAULT` or `NON_DEFAULT`? | `NON_DEFAULT` indicates the LED has been overridden by the application; `DEFAULT` means it reflects normal reader status. |

        '
      operationId: getAppled
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAppledResponse'
      security:
      - bearerAuth: []
    put:
      tags:
      - App-led
      summary: Updates application LED state
      description: '## 1. Description


        The `PUT /cloud/app-led` REST endpoint sets the color, flash behavior, and duration of the application LED on the reader.


        This endpoint allows you to configure:


        - The LED color through `color`

        - Whether the LED flashes through `flash`

        - How long the LED state persists through `seconds`


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Application LED Control |

        | REST Endpoint | `PUT /cloud/app-led` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Supported Colors | `red`, `amber`, `green`, `off` |


        ## 3. Before You Begin


        Decide on the LED color, flash behavior, and duration before sending this request.


        | What You Need | Details |

        |---|---|

        | LED color | One of `red`, `amber`, `green`, or `off` to turn the LED off. `blue` is **not** an application LED colour — it belongs to the stack light only. |

        | Flash behavior | Whether the LED should blink (`true`) or remain solid (`false`). |

        | Duration | How long in seconds the LED state should persist. Set to `0` for indefinite (until the next `PUT /cloud/app-led` request). |

        '
      operationId: setAppled
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetAppledRequest'
            examples:
              set_appled:
                value:
                  color: amber
                  flash: true
                  seconds: 60
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetAppledResponse'
      security:
      - bearerAuth: []
  /cloud/stack-led:
    get:
      tags:
      - Stack-led
      summary: Retrieves stack LED state
      description: '## 1. Description


        > **Product applicability: FXR60 only — not applicable to the FXR90.** The stack LED (stack light) is an FXR60 feature; the FXR90 has no stack light. This endpoint and its schema are documented here because the stack-light definition is shared across the Zebra fixed-reader family. On an FXR90, use `GET /cloud/app-led` for the application LED instead.


        The `GET /cloud/stack-led` REST endpoint retrieves the current state of the stack LED on the reader.


        This endpoint returns status, color, brightness, flash state, configured duration, and remaining time.


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/stack-led` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | **FXR60** — the FXR90 has no stack light |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/stack-led` to:


        - Confirm the current stack LED color, brightness, and flash state

        - Verify the effect of a prior `PUT /cloud/stack-led` call

        - Check how many seconds remain on a timed LED override

        '
      operationId: getStackled
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetStackledResponse'
      security:
      - bearerAuth: []
    put:
      tags:
      - Stack-led
      summary: Updates stack LED state
      description: '## 1. Description


        > **Product applicability: FXR60 only — not applicable to the FXR90.** The stack LED (stack light) is an FXR60 feature; the FXR90 has no stack light. This endpoint and its schema are documented here because the stack-light definition is shared across the Zebra fixed-reader family. On an FXR90, use `PUT /cloud/app-led` for the application LED instead.


        The `PUT /cloud/stack-led` REST endpoint updates the stack LED state on the reader.


        Supported colors: `red`, `amber`, `green`, `blue`, `off`.


        Supported brightness: `low`, `med`, `high` (defaults to `low`).


        > Note on `blue`: `blue` is valid **here**, on the stack light. It is **not** a valid application LED colour — see `PUT /cloud/app-led`, whose colours are `red`, `amber`, `green`, `off`.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/stack-led` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | **FXR60** — the FXR90 has no stack light |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |


        ## 3. Request Body


        | Field | Type | Description |

        |---|---|---|

        | `color` | string | LED color: `red`, `amber`, `green`, `blue`, or `off` |

        | `brightness` | string | `low`, `med`, or `high` |

        | `flash` | boolean | Whether the LED should blink |

        | `seconds` | integer | Duration in seconds; use `0` for indefinite |


        ## 4. When to Use This Endpoint


        Use `PUT /cloud/stack-led` to:


        - Set a visual indicator on the reader stack LED

        - Temporarily override the default LED state with a timed color/flash pattern

        '
      operationId: setStackled
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetStackledRequest'
            examples:
              red_high_alert:
                summary: Color:Red, Brightness:High, Flashing
                description: The LED will blink bright red for 30 seconds.
                value:
                  color: red
                  brightness: high
                  flash: true
                  seconds: 30
              green_solid:
                summary: Color:Green, Brightness:Low(Default), Solid
                description: The LED will stay solid green indefinitely.
                value:
                  color: green
                  flash: false
                  seconds: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetStackledResponse'
      security:
      - bearerAuth: []
  /cloud/gpo:
    get:
      tags:
      - Gpio
      summary: Retrieves the GPO status
      description: '## 1. Description


        The `GET /cloud/gpo` REST endpoint retrieves the current digital output state of all GPO (General Purpose Output) pins on the reader.


        This endpoint returns:


        - The current HIGH or LOW state of each GPO pin (pins 1–4)


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/gpo` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/gpo` to:


        - Verify the current state of GPO outputs before issuing a GPO control command

        - Troubleshoot whether an actuator or signaling device connected to a GPO pin is receiving the correct signal

        - Confirm the effect of a prior GPO set command


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `1` | Is GPO pin 1 HIGH or LOW? | Confirms whether the device driven by port 1 (e.g., a light or gate) is active. |

        | `2` | Is GPO pin 2 HIGH or LOW? | Confirms whether the device driven by port 2 is active. |

        | `3` | Is GPO pin 3 HIGH or LOW? | Confirms whether the device driven by port 3 is active. |

        | `4` | Is GPO pin 4 HIGH or LOW? | Confirms whether the device driven by port 4 is active. |

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetGpoStatusResponse'
      security:
      - bearerAuth: []
    put:
      tags:
      - Gpio
      summary: Updates GPO port state
      description: '## 1. Description


        The `PUT /cloud/gpo` REST endpoint sets the output state of a single General Purpose Output (GPO) pin on the reader.


        This endpoint allows you to configure:


        - The target GPO port number through `port`

        - The desired output state through `state` (boolean: `true` = HIGH, `false` = LOW)


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | GPO Control |

        | REST Endpoint | `PUT /cloud/gpo` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Required Request Fields | `port`, `state` |

        | Supported Port Values | 1-4 (varies by reader model - see `GET /cloud/readerCapabilities`) |


        ## 3. Before You Begin


        Know the port number and desired output state before sending this request. Setting a port beyond the reader''s capacity will result in an error.


        | What You Need | Details |

        |---|---|

        | Port number | The GPO port to target (integer, 1-4). Use `GET /cloud/readerCapabilities` to confirm the maximum number of GPO pins available on this reader model. |

        | Output state | `state` (boolean): `true` to drive the pin HIGH (active), `false` to drive the pin LOW (inactive). |

        | External device wiring | Confirm the wired device is rated for the GPO pin''s voltage and current output before asserting a HIGH state. |

        '
      operationId: setGpo
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetGpoRequest'
            examples:
              set_gpo:
                value:
                  port: 3
                  state: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetGpoResponse'
      security:
      - bearerAuth: []
  /cloud/gpi:
    get:
      tags:
      - Gpio
      summary: Get GPI Status
      description: '## 1. Description


        The `GET /cloud/gpi` REST endpoint retrieves the current digital input state of all GPI (General Purpose Input) pins on the reader.


        This endpoint returns:


        - The current HIGH or LOW state of each GPI pin (pins 1-4)


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `GET /cloud/gpi` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/gpi` to:


        - Check the current digital state of trigger or sensor inputs connected to GPI pins

        - Verify GPI pin state before applying a GPI-triggered workflow

        - Troubleshoot whether an external trigger signal is being received at the reader


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `1` | Is GPI pin 1 HIGH or LOW? | Confirms whether the wired sensor or trigger on port 1 is currently active. |

        | `2` | Is GPI pin 2 HIGH or LOW? | Confirms whether the wired sensor or trigger on port 2 is currently active. |

        | `3` | Is GPI pin 3 HIGH or LOW? | Confirms whether the wired sensor or trigger on port 3 is currently active. |

        | `4` | Is GPI pin 4 HIGH or LOW? | Confirms whether the wired sensor or trigger on port 4 is currently active. |

        '
      operationId: getGPIStatus
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetGPIStatusResponse'
      security:
      - bearerAuth: []
  /cloud/region:
    get:
      tags:
      - Region
      summary: Retrieves reader region information
      description: '## 1. Description


        The `GET /cloud/region` REST endpoint retrieves the reader''s currently configured RF region and the regulatory parameters in effect.


        This endpoint returns:


        - The active region code and country name

        - The regulatory standard currently applied

        - Listen Before Talk (LBT) enable state

        - Frequency hopping state

        - Enabled channel list for the active region

        - Minimum and maximum transmit power supported


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Region Configuration Query |

        | REST Endpoint | `GET /cloud/region` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve active RF region and regulatory settings |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/region` to:


        - Confirm the reader is set to the correct regulatory region before deployment

        - Verify LBT and channel configuration before starting inventory

        - Audit minimum and maximum transmit power for the region

        - Validate region settings after deploying to a new country


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `country` | Is the correct country configured? | The reader must match the regulatory region of its deployment location. |

        | `regulatoryStandard` | Which standard is applied (e.g., `CANADA_FCC_15`)? | Determines which transmission rules apply - channels, power limits, and LBT behavior. |

        | `lbtEnabled` | Is Listen Before Talk active? | Required in some regions (e.g., ETSI). Affects when the radio may transmit. |

        | `FrequencyHopping` | Is frequency hopping enabled? | Mandatory in most regions. Confirms the radio is operating compliantly. |

        | `maxTxPowerSupported` | What is the allowed power ceiling? | Use this to validate transmit power settings before starting inventory. |

        | `channelData` | How many channels are available? | The channel list defines where the reader can operate within the region. |

        '
      operationId: getRegion
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetRegionResponse'
              examples:
                multiple_values:
                  value:
                    FrequencyHopping: true
                    channelData:
                    - 915250
                    - 915750
                    - 903250
                    - 926750
                    country: Canada
                    lbtEnabled: false
                    maxTxPowerSupported: 300
                    minTxPowerSupported: 100
                    region: US
                    regulatoryStandard: FCC
      security:
      - bearerAuth: []
    put:
      tags:
      - Region
      summary: Update region information
      description: '## 1. Description


        The `PUT /cloud/region` REST endpoint updates the reader''s RF region and the regulatory standard applied during inventory.


        This endpoint allows you to configure:


        - The deployment country through `country`

        - The regulatory standard to apply through `standardname`

        - Optionally, the Listen Before Talk (LBT) state through `isLBT`, when the selected standard supports it

        - Optionally, a specific channel frequency list (kHz) through `channeldata`, when the selected standard supports channel selection


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Region Configuration |

        | REST Endpoint | `PUT /cloud/region` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Required Request Fields | `country`, `standardname` |


        ## 3. Before You Begin


        Verify the target country and standard are supported before sending this request. Applying an incorrect region may make the reader non-compliant with local RF regulations.


        | What You Need | Details |

        |---|---|

        | Country name | Use `GET /cloud/supportedRegionList` to retrieve the exact country name string accepted by the reader. |

        | Standard name | Use `GET /cloud/supportedStandardList` to retrieve valid standard names for the target country. |

        | LBT override (optional) | Provide `isLBT` (boolean) to set Listen Before Talk when the selected standard supports it. |

        | Channel selection (optional) | Provide `channeldata` (list of center frequencies in kHz) when the selected standard supports channel selection. |

        | Active inventory | Stop inventory with `PUT /cloud/stop` before changing region. Region changes take effect immediately and affect all RF parameters. |

        | LBT and channel behavior | Some standards mandate LBT always-on or restrict channel usage. Review the standard entry from `GET /cloud/supportedStandardList` before applying. |

        '
      operationId: setRegion
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRegionRequest'
            examples:
              set_region:
                value:
                  country: Canada
                  standardname: CANADA_FCC_15
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetRegionResponse'
      security:
      - bearerAuth: []
  /cloud/supportedRegionList:
    get:
      tags:
      - Region
      summary: Retrieves the supported region list based on the reader type
      description: '## 1. Description


        The `GET /cloud/supportedRegionList` REST endpoint retrieves the list of RF regions this reader is permitted to operate in.


        This endpoint returns:


        - The set of supported country or region names that can be applied via `PUT /cloud/region`


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Supported Region Query |

        | REST Endpoint | `GET /cloud/supportedRegionList` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve the list of permitted RF regions for this reader |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/supportedRegionList` to:


        - Determine valid values before calling `PUT /cloud/region`

        - Confirm that the target deployment region is supported by this hardware

        - Build a region picker in a provisioning or configuration UI

        - Audit region support across different reader hardware variants in the same fleet


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | Region list | Is the target deployment region present? | Attempting to set an unsupported region via `PUT /cloud/region` will result in an error. |

        '
