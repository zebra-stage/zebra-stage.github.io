              set_Network_wifi_dhcp:
                summary: WiFi — WPA3 Personal.Similarly applicable for WPA2Personal,WPA2Enterprise, WPA3Enterprise,
                value:
                  mlan0:
                    accesspoint:
                      autoConn: true
