  /cloud/mode:
    get:
      tags:
      - Control
      summary: Retrieves the operating mode
      description: '## 1. Description


        The `GET /cloud/mode` REST endpoint retrieves the reader''s current operating mode and the RF settings associated with that mode.


        This endpoint returns:


        - The operating mode type (`SIMPLE`, `INVENTORY`, `PORTAL`, `CONVEYOR`, or `CUSTOM`)

        - Active antennas or beams and their transmit power settings

        - The environment profile in use

        - Mode-specific configuration settings (portal, conveyor, directionality, etc.)

        - Gen2 query, select, and access settings

        - Report filtering, RSSI filtering, metadata fields, and radio start/stop conditions


        An optional `verbose` flag controls how much of the configuration is returned.


        ## 2. The `verbose` Flag


        The request body optionally accepts a single boolean field, `verbose`, that controls the level of detail in the response:


        | `verbose` | Response |

        |---|---|

        | `false` (or body omitted) | Returns **only the settings explicitly configured** for the current mode. Default values are omitted. |

        | `true` | Returns the **entire mode configuration**, including every default value. |


        An empty body (`{}`) behaves the same as `verbose: false`. Use `verbose: true` when you need to see every effective setting, including the ones the reader is applying by default.


        ## 3. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Operating Mode Query |

        | REST Endpoint | `GET /cloud/mode` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve active operating mode and RF settings |


        ## 4. When to Use This Endpoint


        Use `GET /cloud/mode` to:


        - Confirm the active mode before starting an inventory session

        - Verify antenna and transmit power selection before RF operations

        - Check the environment profile currently in use

        - Review mode-specific settings before changing them with `PUT /cloud/mode`

        - Check tag reporting and RSSI filter settings before a site validation


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `type` | Which mode is active (`SIMPLE`, `INVENTORY`, `PORTAL`, ...)? | Determines which RF behavior and tag reporting logic the reader uses. |

        | `antennas` | Are the right ports enabled with the expected transmit power? | Misconfigured antennas result in missed reads or coverage gaps. |

        | `transmitPower` | Is the power level within regulatory limits? | Transmit power must stay below the regional maximum reported by `GET /cloud/region`. |

        | `environment` | Is the profile matched to the deployment environment? | Affects reader sensitivity and false-read filtering for the deployment environment. |

        '
      operationId: getMode
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetModeRequest'
            examples:
              default_configured_only:
                summary: Configured values only (default)
                value: {}
              verbose_full:
                summary: Entire configuration including defaults
                value:
                  verbose: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/operatingMode.v1'
              example:
                modeSpecificSettings:
                  interval:
                    unit: seconds
                    value: 1
                antennaStopCondition:
                - type: DURATION
                  value: 100
                - type: DURATION
                  value: 100
                - type: DURATION
                  value: 100
                antennas:
                - 1
                - 5
                - 6
                delayBetweenAntennaCycles:
                  duration: 0
                  type: DISABLED
                query:
                - tagPopulation: 256
                - tagPopulation: 256
                - tagPopulation: 256
                inventoryProtocol:
                  mode: GEN2
                reportFilter:
                  duration: 0
                  type: PER_ANTENNA
                filter:
                  value: 3008.*
                  match: regex
                  operation: include
                selects:
                - target: S1
                  action: INVB_NOTHING
                  membank: TID
                  pointer: 6
                  length: 24
                  mask: '800600'
                tagMetaData:
                - ANTENNA
                - RSSI
                - CHANNEL
                - PC
                - XPC
                - CRC
                - SEEN_COUNT
                - PHASE
                - gpsCoordinates:
                    latitude: 12.9703
                    longitude: 77.7101
                transmitPower:
                - 20
                - 20
                - 20
                rssiFilter:
                  threshold: -72
                type: CUSTOM
                environment: HIGH_INTERFERENCE
      security:
      - bearerAuth: []
    put:
      tags:
      - Control
      summary: Updates the reader's operating mode
      description: '## 1. Description


        The `PUT /cloud/mode` REST endpoint configures the reader''s operating mode and all RF settings associated with that mode.


        This endpoint allows you to configure:


        - The operating mode type through `type`

        - Antenna port selection and transmit power through `antennas`

        - The RF environment profile through `environment`

        - Inventory stop behavior through `antennaStopCondition`

        - Gen2 query, select, and access settings

        - Report filtering, RSSI filtering, and metadata options


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Operating Mode Configuration |

        | REST Endpoint | `PUT /cloud/mode` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Request Schema | `operatingMode.v1` |

        | Supported Mode Types | `SIMPLE`, `INVENTORY`, `PORTAL`, `CONVEYOR`, `CUSTOM` |

        | Supported Environment Profiles | `LOW_INTERFERENCE`, `HIGH_INTERFERENCE`, `VERY_HIGH_INTERFERENCE`, `AUTO_DETECT`, `DEMO` |


        ## 3. Before You Begin


        Decide on your mode configuration before sending this request. Changing mode while inventory is active can disrupt reads - call `PUT /cloud/stop` first if the reader is currently reading.


        | What You Need | Details |

