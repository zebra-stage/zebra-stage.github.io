  /cloud/networkInterfaces:
    get:
      tags:
      - Network
      summary: Retrieves network interfaces
      description: '## 1. Description


        The `GET /cloud/networkInterfaces` REST endpoint retrieves the list of network interfaces available on the reader.


        This endpoint returns:


        - The list of available network interface names, returned in `availableNetworkInterfaces` (e.g., `eth0`, `mlan0`, `wan0`, `bnep0`, `uap0`)


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Network Interface Query |

        | REST Endpoint | `GET /cloud/networkInterfaces` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve available network interface names |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/networkInterfaces` to:


        - Identify which network interfaces are present before configuring them via `PUT /cloud/network`

        - Confirm Ethernet, Wi-Fi, Bluetooth, or cellular interface availability on this reader model

        - Use returned interface names as valid keys in subsequent network configuration calls


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `availableNetworkInterfaces` | Are all expected interfaces present (`eth0`, `mlan0`, `wan0`)? | Only interfaces returned here can be configured in `PUT /cloud/network`. |

        | `wan0` presence | Is the cellular interface listed? | Confirms whether the reader hardware supports cellular connectivity. |

        '
      operationId: getNetworkinterfaces
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetNetworkinterfacesResponse'
              examples:
                application/json:
                  value:
                    availableNetworkInterfaces:
                    - eth0
                    - mlan0
                    - bnep0
                    - wan0
      security:
      - bearerAuth: []
  /cloud/readPoints:
    get:
      tags:
      - Network
      summary: Gets the read points on the reader
      description: '## 1. Description


        The `GET /cloud/readPoints` REST endpoint retrieves the read points available on the reader.


        This endpoint returns:


        - The list of read-point identifiers available on this reader


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Read Point Query |

        | REST Endpoint | `GET /cloud/readPoints` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve available reader read points |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/readPoints` to:


        - Identify available read-point identifiers before configuring cable loss compensation

        - Map physical read points before configuring inventory behavior in `PUT /cloud/mode`

        - Verify read-point availability before referencing them in antenna configuration


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | Read-point list | How many read points are returned? | Determines how many antenna ports are physically available for use. |

        | Read-point IDs | Do the returned IDs match expected port numbering? | Read-point identifiers must match exactly when used in `PUT /cloud/cableLossCompensation` or `PUT /cloud/mode`. |

        '
      operationId: getReadpoints
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetReadpointsResponse'
              example:
              - '1'
              - '2'
              - '3'
              - '4'
              - '5'
              - '6'
      security:
      - bearerAuth: []
  /cloud/readerLocation:
    get:
      tags:
      - Network
      summary: Gets the GPS coordinates (lat/long)
      description: '## 1. Description


        The `GET /cloud/readerLocation` REST endpoint retrieves the reader''s last reported GPS coordinates.


        This endpoint returns:


        - Latitude and longitude values

        - The number of satellites used for the last fix

        - The time the location was last reported (`lastReportedTime`)


        No request body is required. The returned values represent the most recent location data known to the reader.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | GPS Coordinates Query |

        | REST Endpoint | `GET /cloud/readerLocation` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve the reader''s last known GPS coordinates |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/readerLocation` to:


        - Record reader location for asset tracking or fleet management

        - Confirm GPS or location availability on a deployed reader

        - Feed location data into site, inventory, or logistics systems


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `latitude` | Is a valid latitude value returned? | A null or zero value may indicate the reader does not have a GPS fix yet. |

        | `longitude` | Is a valid longitude value returned? | Combined with latitude, this identifies the reader''s physical position. |

        | `satellitesUsed` | How many satellites produced the fix? | A low satellite count indicates a weak fix and less reliable coordinates. |

        | `lastReportedTime` | When was the location last reported? | Indicates how recent the coordinates are; a stale timestamp means the position may be outdated. |

        '
      operationId: getGpsCoordinates
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetGpsCoordinatesResponse'
      security:
      - bearerAuth: []
  /cloud/eSimConfig:
    get:
      tags:
      - Network
      summary: Gets the eSIM configuration
      description: '## 1. Description


        The `GET /cloud/eSimConfig` REST endpoint retrieves eSIM identity and profile information from the reader.


        This endpoint returns:


        - The reader EID (eSIM identifier) and IMEI

        - Installed eSIM profiles, including nickname (`profileNickName`), provider, ICCID (`iccid`), and activation state (`enabled`)


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | eSIM Configuration Query |

        | REST Endpoint | `GET /cloud/eSimConfig` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve eSIM identity and installed profile details |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/eSimConfig` to:


        - Audit cellular or eSIM provisioning status on the reader

        - Check the EID and IMEI values for SIM registration or support cases

        - Review installed eSIM profiles before enabling or switching a profile with `PUT /cloud/eSimConfig`


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `eid` | Is the EID correct for this SIM profile? | The EID uniquely identifies the eSIM hardware and is required for carrier provisioning. |

        | `imei` | Is the IMEI registered with the carrier? | An unregistered IMEI cannot establish a cellular data connection. |

        | `profiles` | Which profiles are installed and which is active? | Only one profile can be active at a time; use this to confirm the correct carrier profile is enabled. |

        '
      operationId: getEsimConfig
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetEsimConfigResponse'
      security:
      - bearerAuth: []
    put:
      tags:
      - Network
      summary: Sets the eSIM configuration
      description: '## 1. Description


        The `PUT /cloud/eSimConfig` REST endpoint updates the eSIM profile state on the reader.


        This endpoint allows you to configure:


        - The eSIM operation to perform through `operation`

        - The target profile nickname through `profileNickName`

        - The activation code for provisioning a new profile through `activationID`


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | eSIM Configuration |

        | REST Endpoint | `PUT /cloud/eSimConfig` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Supported Operations | `add`, `delete`, `enable`, `disable` |


        ## 3. Before You Begin


        Use `GET /cloud/eSimConfig` first to retrieve the exact profile nickname available on the reader before sending this request.


        | What You Need | Details |

        |---|---|

        | Operation | The eSIM operation to perform: `add` to provision a new profile, `delete` to remove one, `enable` to activate the selected profile, or `disable` to deactivate it. |

        | Profile nickname | The exact nickname of the eSIM profile to apply the operation to, as returned by `GET /cloud/eSimConfig`. The nickname must match exactly - case-sensitive. |

        | Activation code | Required only when `operation` is `add`: the activation code/ID (`activationID`) used to provision the new eSIM profile. Omit for `enable`, `disable`, and `delete`. |

        | Active SIM setting | After enabling an eSIM profile, confirm the `wan0.activeSim` is set to `esim` in the network configuration (see `PUT /cloud/network`) for the profile to be used for data. |

        '
      operationId: setEsimConfig
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetEsimConfigRequest'
            examples:
              set_eSimConfig_enable:
                value:
                  operation: enable
                  profileNickName: gnd1
              set_eSimConfig_add:
                value:
                  operation: add
                  profileNickName: gnd1
                  activationID: LPA:1$RSP.GSMA.COM$ABCDEF1234567890
              set_eSimConfig_delete:
                value:
                  operation: delete
                  profileNickName: gnd1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetEsimConfigResponse'
      security:
      - bearerAuth: []
  /cloud/os:
    put:
      tags:
      - Firmware
      summary: Updates OS software on device
      description: '## 1. Description


        The `PUT /cloud/os` REST endpoint updates the reader''s operating system firmware by downloading and installing a build from a URL.


        This endpoint allows you to configure:


        - The firmware download URL through `url`

        - The download authentication method through `authenticationType`

        - Download credentials through `options`

        - Optional custom HTTP headers through `headers`


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | OS Firmware Update |

        | REST Endpoint | `PUT /cloud/os` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Required Request Fields | `url`, `authenticationType` |

        | Supported Transfer Protocols | `HTTPS`, `SFTP`, `SCP`, `FTPS` |

        | Supported Authentication Types | `NONE`, `BASIC` |


        ## 3. Before You Begin


        Gather all firmware download details before sending this request. A failed OS update can take the reader offline - plan for maintenance downtime and ensure the firmware URL is reachable from the reader''s network before proceeding.


        | What You Need | Details |

        |---|---|

        | Firmware URL | The URL of the firmware directory on a server the reader can reach over `HTTPS`, `SFTP`, `SCP`, or `FTPS`. The reader fetches a file list from this URL, then downloads the appropriate build. |

        | Authentication type | `NONE` if no download credentials are required, or `BASIC` for username/password HTTP authentication. |

        | Download credentials | Required when `authenticationType` is `BASIC`. Provide `options.username` and `options.password`. |

        | JWT bearer token | Optional - supply a JWT in `headers.Authorization` for token-based authentication, regardless of `authenticationType`. |

        | Network reachability | The reader must be able to reach the firmware URL on the network. Confirm firewall rules allow the chosen protocol (`HTTPS`, `SFTP`, `SCP`, or `FTPS`) outbound on the port used by the firmware server. |

        | Current firmware version | Use `GET /cloud/version` to confirm the reader''s current build before initiating an update. |

        | Rollback plan | If the update fails, use `PUT /cloud/revertbackOS` to return to the previous OS version. |


        > Note: This endpoint performs a **server-based** update — the reader downloads the build from `url` over `HTTPS`, `SFTP`, `SCP`, or `FTPS`. The reader also supports two update methods that do not use this endpoint: a **file-based update** (the firmware file is uploaded directly to the reader) and a **USB update** (the firmware is applied from a USB drive).

        '
      operationId: setOs
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetOsRequest'
            examples:
              set_os:
                value:
                  url: https://10.117.229.9:9093/BUILDS/FXR90_2.0.10.tar.bz2
                  authenticationType: NONE
                  options:
                    username: test
                    password: test
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetOsResponse'
      security:
      - bearerAuth: []
  /cloud/revertbackOS:
    put:
      tags:
      - Firmware
      summary: Revert to previous OS version
      description: '## 1. Description


        The `PUT /cloud/revertbackOS` REST endpoint reverts the reader firmware to the previous OS version on the secondary partition.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | Firmware Rollback |

        | REST Endpoint | `PUT /cloud/revertbackOS` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Request Body | None |


        ## 3. Before You Begin


        Plan for downtime — the reader reboots to the secondary partition to activate the previous firmware.


        | What You Need | Details |

        |---|---|

        | Current firmware version | Use `GET /cloud/version` to confirm the current and previous OS builds before rolling back. |

        | Downtime window | The reader reboots to the secondary partition; allow time for the reboot and reconnect. |

        '
      operationId: setRevertbackos
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetRevertbackosRequest'
            examples:
              set_revertbackOS:
                value: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetRevertbackosResponse'
      security:
      - bearerAuth: []
  /cloud/apps/install:
    put:
      tags:
      - userapp
      summary: Install user application
      description: '## 1. Description


        The `PUT /cloud/apps/install` REST endpoint installs a user application (`.deb` package) on the reader by downloading it from a file server.


        This endpoint allows you to configure:


        - The download source URL through `url`

        - The package filename through `filename`

        - The authentication method for the download server through `authenticationType`


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | User Application Installation |

        | REST Endpoint | `PUT /cloud/apps/install` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Required Request Fields | `url`, `filename`, `authenticationType` |

        | Supported Authentication Types | `NONE`, `BASIC` |


        ## 3. Before You Begin


        Gather download server details before sending this request. The reader must be able to reach the URL from its network.


        | What You Need | Details |

        |---|---|

        | File server URL | The base URL hosting the `.deb` package (for example, HTTP, HTTPS, or SFTP), supplied through `url`. |

        | Filename | The exact `.deb` filename on the server, supplied through `filename`. |

        | Authentication type | `NONE` if the download server requires no credentials, or `BASIC` for username/password authentication (`options.username`, `options.password`). |

        | TLS verification | Optional `verifyPeer` and `verifyHost` flags, plus an optional CA certificate path or inline content for HTTPS servers. |

        '
      operationId: setInstalluserapp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetInstalluserappRequest'
            examples:
              set_installUserapp:
                value:
                  options:
                    password: L@bu$3rs
                    username: labuser
                  authenticationType: BASIC
                  filename: mylogger_1.0.1.deb
                  url: sftp://10.117.229.15/home/labuser/EV1/
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetInstalluserappResponse'
      security:
      - bearerAuth: []
  /cloud/apps/{appname}/start:
    put:
      tags:
      - userapp
      summary: Start user application
      description: '## 1. Description


        The `PUT /cloud/apps/{appname}/start` REST endpoint starts a user application installed on the reader. The application is identified by the `{appname}` path parameter.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | User Application Control — Start |

        | REST Endpoint | `PUT /cloud/apps/{appname}/start` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Path Parameter | `appname` (the installed application to start) |

        | Request Body | None (the app name is supplied as the `{appname}` path parameter) |


        ## 3. Before You Begin


        Confirm the application is installed before starting it. Use `GET /cloud/apps` to verify the exact `appname` and its current running status.


        | What You Need | Details |

        |---|---|

        | Application name | The exact name of the installed application, supplied as the `{appname}` path parameter, as returned by `GET /cloud/apps`. |

        | Installation check | The application must already be installed via `PUT /cloud/apps/install` before it can be started. |

        '
      operationId: setStartuserapp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetStartuserappRequest'
            examples:
              set_startUserapp:
                value:
                  appname: mylogger
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetStartuserappResponse'
      security:
      - bearerAuth: []
    parameters:
    - name: appname
      in: path
      required: true
      schema:
        type: string
  /cloud/apps/{appname}/stop:
    put:
      tags:
      - userapp
      summary: Stop user application
      description: '## 1. Description


        The `PUT /cloud/apps/{appname}/stop` REST endpoint stops a running user application on the reader. The application is identified by the `{appname}` path parameter.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | User Application Control — Stop |

        | REST Endpoint | `PUT /cloud/apps/{appname}/stop` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Path Parameter | `appname` (the running application to stop) |

        | Request Body | None (the app name is supplied as the `{appname}` path parameter) |


        ## 3. Before You Begin


        Confirm the application is running before stopping it. Use `GET /cloud/apps` to verify the exact `appname` and its current running status.


        | What You Need | Details |

        |---|---|

        | Application name | The exact name of the running application, supplied as the `{appname}` path parameter, as returned by `GET /cloud/apps`. |

        '
      operationId: setStopuserapp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetStopuserappRequest'
            examples:
              set_stopUserapp:
                value:
                  appname: mylogger
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetStopuserappResponse'
      security:
      - bearerAuth: []
    parameters:
    - name: appname
      in: path
      required: true
      schema:
        type: string
  /cloud/apps/{appname}/autostart:
    put:
      tags:
      - userapp
      summary: Autostart user application
      description: '## 1. Description


        The `PUT /cloud/apps/{appname}/autostart` REST endpoint configures whether a user application starts automatically when the reader boots. The application is identified by the `{appname}` path parameter.


        This endpoint allows you to configure:


        - Whether the application starts automatically on boot through `autostart`


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | User Application Autostart Configuration |

        | REST Endpoint | `PUT /cloud/apps/{appname}/autostart` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Path Parameter | `appname` (the application to configure) |

        | Required Request Fields | `autostart` |


        ## 3. Before You Begin


        Decide the desired boot behavior before sending this request.


        | What You Need | Details |

        |---|---|

        | Application name | The exact `appname`, supplied as the `{appname}` path parameter, as returned by `GET /cloud/apps`. |

        | Autostart flag | `autostart` (boolean): `true` to start the app automatically on boot, or `false` to disable autostart. |

        '
      operationId: setAutostartuserapp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetAutostartuserappRequest'
            examples:
              set_autostartUserapp:
                value:
                  appname: mylogger
                  autostart: true
              set_autostartUserapp-false:
                value:
                  appname: mylogger
                  autostart: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetAutostartuserappResponse'
      security:
      - bearerAuth: []
    parameters:
    - name: appname
      in: path
      required: true
      schema:
        type: string
  /cloud/apps:
    get:
      tags:
      - userapp
      summary: List user applications
      description: '## 1. Description


        The `GET /cloud/apps` REST endpoint retrieves the list of user applications installed on the reader.


        This endpoint returns:


        - An array of installed user apps, each with `appname`, `autostart`, `runningStatus`, and `metadata`


        No request body is required.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | User Application Inventory Query |

        | REST Endpoint | `GET /cloud/apps` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Supported Operations | Retrieve the list of installed user applications |


        ## 3. When to Use This Endpoint


        Use `GET /cloud/apps` to:


        - Confirm which user apps are installed before issuing start, stop, or uninstall requests

        - Check whether a user app is currently running

        - Verify autostart configuration per installed app

        - Audit deployed applications across a fleet of readers


        Key fields to check in the response:


        | Field | What to Check | Why It Matters |

        |---|---|---|

        | `appname` | Is the expected app present? | Confirms successful installation before attempting to start or configure the app. |

        | `runningStatus` | Is the app currently running? | Required before sending a stop request; also confirms a successful start. |

        | `autostart` | Is autostart enabled? | Determines whether the app will resume automatically after a reboot. |

        '
      operationId: getUserapps
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserappsResponse'
              example:
              - appname: mylogger
                runningStatus: true
                autostart: false
                metadata: 'APP_TYPE: DA'
              - appname: sample
                runningStatus: false
                autostart: true
                metadata: 'APP_TYPE: NORMAL'
      security:
      - bearerAuth: []
  /cloud/setdataToRG:
    put:
      tags:
      - userapp
      summary: Set Data to RG
      description: '## 1. Description


        The `PUT /cloud/setdataToRG` REST endpoint triggers the reader gateway to process and deliver any buffered tag data.


        This is a **trigger-only** call — you do not upload tag data in the request. The reader flushes data that is already buffered on the device. No request body is required.


        ## 2. Before You Begin


        Confirm that the reader gateway is configured and active before calling this endpoint. If no data is buffered or the gateway is not configured, the call may succeed but have no effect.


        | What You Need | Details |

        |---|---|

        | Reader gateway | Valid endpoint settings (see `GET /cloud/config`) |

        | Buffered data | Tag events waiting for delivery |


        ## 3. Endpoint Details


        | Property | Value |

        |---|---|

        | REST Endpoint | `PUT /cloud/setdataToRG` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Request body | None |

        '
      operationId: setDataToRG
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetDataToRGRequest'
            examples:
              set_dataToRG:
                value: {}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetDataToRGResponse'
      security:
      - bearerAuth: []
  /cloud/apps/{appname}/pass-through:
    put:
      tags:
      - userapp
      summary: Send Request to Userapp
      description: '## 1. Description


        The `PUT /cloud/apps/{appname}/pass-through` REST endpoint sends a custom request or data payload to a user application running on the reader. The application is identified by the `{appname}` path parameter.


        This endpoint allows you to configure:


        - The command or data payload to deliver through `command`


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | User Application Request |

        | REST Endpoint | `PUT /cloud/apps/{appname}/pass-through` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

        | Content-Type | `application/json` |

        | Path Parameter | `appname` (the target application) |

        | Required Request Fields | `command` |


        ## 3. Before You Begin


        Confirm the target user application is installed and running before sending this request. A request to a stopped or missing application will fail.


        | What You Need | Details |

        |---|---|

        | Application name | The exact `appname`, supplied as the `{appname}` path parameter, as returned by `GET /cloud/apps`. |

        | Command or data | The `command` object to pass to the user application (for example, `command.message`). The expected structure is defined by the user application, not by the reader API. |

        | Application state | Use `GET /cloud/apps` to confirm the target application is running (`runningStatus: true`) before sending. A stopped application may not be able to process the request. |

        '
      operationId: setReqtouserapp
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetReqtouserappRequest'
            examples:
              set_reqToUserapp:
                value:
                  command:
                    message: Hello World!!!
                  userapp: mylogger
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetReqtouserappResponse'
      security:
      - bearerAuth: []
    parameters:
    - name: appname
      in: path
      required: true
      schema:
        type: string
  /cloud/apps/{appname}/uninstall:
    put:
      tags:
      - userapp
      summary: Uninstall User Application
      description: '## 1. Description


        The `PUT /cloud/apps/{appname}/uninstall` REST endpoint removes a user application from the reader. The application is identified by the `{appname}` path parameter.


        ## 2. Endpoint Details


        | Property | Value |

        |---|---|

        | Pattern Name | User Application Removal |

        | REST Endpoint | `PUT /cloud/apps/{appname}/uninstall` |

        | Communication Type | Client to Device (HTTP request/response) |

        | Applies To | FXR90 |

        | Authentication | Bearer token (`Authorization: Bearer <token>`) |

