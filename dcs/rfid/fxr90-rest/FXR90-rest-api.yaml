            examples:
              enable_ble:
                value:
                  ble:
                    enable: true
              enable_with_interval:
                value:
                  ble:
                    enable: true
                    scanIntervalSec: 5
              enable_with_rssi_filter:
                value:
                  ble:
                    enable: true
                    scanIntervalSec: 10
                    additionalFilters:
