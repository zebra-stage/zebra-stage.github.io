                interfaceConnectionStatus:
                  data:
                  - connectionError: ''
                    connectionStatus: connected
                    description: WEBSOCKET_TESTs
                    interface: WEBSOCKET_TEST
                ntp:
                  offset: 0
                  reach: 0
                powerNegotiation: POE+
                powerSource: DC
                radioActivity: inactive
                radioConnection: connected
                ram:
                  free: 76
                  total: 100
                  used: 24
                systemTime: 13/06/2024 11:19
                temperature: 33
                uptime: 0D1H13M15S
                impinjGen2X:
                  active: true
