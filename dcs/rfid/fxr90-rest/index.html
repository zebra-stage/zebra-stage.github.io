<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FXR90 REST API — Swagger UI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.32.8/swagger-ui.css" />
  <style>
    body { margin: 0; background: #fafafa; }

    /* Deep nested schemas (e.g. getConfigResponse) misalign in default Swagger UI */
    .swagger-ui .model-box,
    .swagger-ui .model-box-control {
      max-width: 100%;
      overflow-x: auto;
    }
    .swagger-ui table.model tbody tr td:first-of-type {
      width: auto !important;
      min-width: 0;
      padding-right: 1em;
      vertical-align: top;
    }
    .swagger-ui table.model tbody tr td {
      vertical-align: top;
    }
    .swagger-ui .model-toggle {
      top: 2px;
    }
    .swagger-ui .model {
      word-break: break-word;
    }

    /*
     * Swagger UI 5 dark mode uses html.dark-mode (not data-theme="dark").
     * Built-in dark styles omit markdown headings and table body cells inside
     * opblock descriptions, leaving #3b4151 text on a dark background.
     */
    html.dark-mode .swagger-ui .opblock-description-wrapper,
    html.dark-mode .swagger-ui .opblock-title_normal {
      color: #e4e6e6 !important;
    }
    html.dark-mode .swagger-ui .markdown h1,
    html.dark-mode .swagger-ui .markdown h2,
    html.dark-mode .swagger-ui .markdown h3,
    html.dark-mode .swagger-ui .markdown h4,
    html.dark-mode .swagger-ui .renderedMarkdown h1,
    html.dark-mode .swagger-ui .renderedMarkdown h2,
    html.dark-mode .swagger-ui .renderedMarkdown h3,
    html.dark-mode .swagger-ui .renderedMarkdown h4,
    html.dark-mode .swagger-ui .opblock-description-wrapper h1,
    html.dark-mode .swagger-ui .opblock-description-wrapper h2,
    html.dark-mode .swagger-ui .opblock-description-wrapper h3,
    html.dark-mode .swagger-ui .opblock-description-wrapper h4,
    html.dark-mode .swagger-ui .markdown table th,
    html.dark-mode .swagger-ui .markdown table td,
    html.dark-mode .swagger-ui .renderedMarkdown table th,
    html.dark-mode .swagger-ui .renderedMarkdown table td,
    html.dark-mode .swagger-ui .opblock-description-wrapper table th,
    html.dark-mode .swagger-ui .opblock-description-wrapper table td,
    html.dark-mode .swagger-ui table tbody tr td,
    html.dark-mode .swagger-ui table tbody tr th {
      color: #e4e6e6 !important;
    }
    html.dark-mode .swagger-ui .markdown table th,
    html.dark-mode .swagger-ui .markdown table td,
    html.dark-mode .swagger-ui .renderedMarkdown table th,
    html.dark-mode .swagger-ui .renderedMarkdown table td {
      border-color: #545d61;
    }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.32.8/swagger-ui-bundle.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.32.8/swagger-ui-standalone-preset.js" crossorigin></script>
  <script>
    window.onload = function () {
      window.ui = SwaggerUIBundle({
        url: "./FXR90-rest-api.yaml",
        dom_id: "#swagger-ui",
        deepLinking: true,
        defaultModelExpandDepth: 2,
        defaultModelsExpandDepth: 1,
        displayRequestDuration: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: "StandaloneLayout"
      });
    };
  </script>
</body>
</html>
